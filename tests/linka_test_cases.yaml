##############################################################################
# Linka Android — Casos de Teste para Firebase App Testing Agent
# Versão: 2.0 — Cobertura completa (happy path + negativo + layout + navegação)
# App: io.linka.app.kotlin — v0.11.0 (versionCode 29)
# Execução: firebase apptesting:execute --test-dir=./tests
# Quota: 200 execuções/mês por projeto (preview) — cada caso = 1 execução
# Timeout: 5 minutos por caso de teste
# Total: 57 casos · 148 steps
##############################################################################

tests:

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 1 — ONBOARDING
  # Cobre: 3 slides, checkbox obrigatório, permissões, back entre slides,
  #        bloqueio de avanço sem aceitar termos, rejeição de permissões
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[1.1] Onboarding — fluxo completo aceitando tudo"
    id: onboarding-completo
    steps:
      - goal: Avançar o slide inicial de boas-vindas do onboarding
        hint: Procure botão "Próximo", "Continuar" ou deslize para a esquerda
        finalScreenAssertion: >-
          O slide 2 de privacidade e termos está visível na tela.

      - goal: Marcar o checkbox de aceite dos termos de uso e política de privacidade
        hint: >-
          Há um checkbox rotulado "Aceitar termos de uso e política de privacidade".
          Toque nele para marcar.
        finalScreenAssertion: >-
          O checkbox está marcado (checked). O botão de avançar está habilitado,
          não está em estado desabilitado/cinza.

      - goal: Avançar para o slide de permissões
        hint: Toque no botão "Próximo" ou "Continuar"
        finalScreenAssertion: >-
          O slide 3 de permissões está visível com cards descrevendo pelo menos
          uma permissão necessária (localização, dispositivos próximos ou notificações).

      - goal: Concluir o onboarding tocando no botão "Começar" ou "Começar →"
        finalScreenAssertion: >-
          A tela principal do Linka está visível com barra de navegação inferior
          contendo exatamente 5 abas: Início, Velocidade, Sinal, Histórico e Ajustes.

  - displayName: "[1.2] Onboarding — bloqueio de avanço sem aceitar termos"
    id: onboarding-sem-termos
    steps:
      - goal: Avançar o slide inicial de boas-vindas sem aceitar termos
        finalScreenAssertion: >-
          O slide 2 de privacidade e termos está visível. O checkbox de aceite
          ainda está desmarcado.

      - goal: Tentar avançar para o próximo slide sem marcar o checkbox de termos
        hint: Toque no botão de avançar sem marcar o checkbox
        finalScreenAssertion: >-
          O app não avançou para o slide 3. Permanece no slide 2 (privacidade/termos).
          O checkbox continua desmarcado. O botão de avançar está desabilitado
          ou a ação foi ignorada.

  - displayName: "[1.3] Onboarding — rejeitar permissão e continuar"
    id: onboarding-permissao-rejeitada
    prerequisiteTestCaseId: onboarding-sem-termos
    steps:
      - goal: Aceitar os termos e avançar para o slide de permissões
        hint: Marque o checkbox e toque em "Próximo"
        finalScreenAssertion: >-
          O slide de permissões está visível com cards de permissão.

      - goal: Pular ou recusar as permissões solicitadas sem conceder nenhuma
        hint: >-
          Se houver um botão "Pular", "Agora não" ou "Recusar", toque nele.
          Se abrir um diálogo do sistema de permissão, escolha "Negar".
        finalScreenAssertion: >-
          O app avançou para a tela principal mesmo sem permissões concedidas.
          A tela Home está visível. O app não travou nem exibiu erro irrecuperável.

  - displayName: "[1.4] Onboarding — navegar para trás entre slides"
    id: onboarding-back-slide
    steps:
      - goal: No slide inicial do onboarding, avançar para o slide 2
        hint: Toque em "Próximo" ou deslize para a esquerda
        finalScreenAssertion: O slide 2 está visível.

      - goal: Pressionar o botão Voltar do sistema para retornar ao slide anterior
        hint: Use o gesto de voltar do Android (swipe da borda ou botão de voltar)
        finalScreenAssertion: >-
          O slide 1 de boas-vindas voltou a estar visível.
          O app não foi fechado nem exibiu erro.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 2 — NAVEGAÇÃO / APPSHELL
  # Cobre: 5 abas, back em overlay, dialog de dados móveis,
  #        swipe down em bottom sheet, backstack
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[2.1] Navegação — percorrer todas as 5 abas"
    id: navegacao-abas
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Tocar na aba "Velocidade" na barra de navegação inferior
        finalScreenAssertion: >-
          A tela de Velocidade está visível com seletor de modo de teste.

      - goal: Tocar na aba "Sinal" na barra de navegação inferior
        finalScreenAssertion: >-
          A tela de Sinal está visível com informações sobre a rede atual.

      - goal: Tocar na aba "Histórico" na barra de navegação inferior
        finalScreenAssertion: >-
          A tela de Histórico está visível com lista de medições ou estado vazio.

      - goal: Tocar na aba "Ajustes" na barra de navegação inferior
        finalScreenAssertion: >-
          A tela de Ajustes está visível com lista de opções de configuração.

      - goal: Tocar na aba "Início" na barra de navegação inferior
        finalScreenAssertion: >-
          A tela Home (Início) está visível com o card de conexão atual.

  - displayName: "[2.2] Navegação — botão Voltar fecha overlay/bottom sheet"
    id: navegacao-back-overlay
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Abrir qualquer ferramenta que apareça como bottom sheet ou overlay
        hint: >-
          Na tela Início ou Velocidade, toque em "DNS", "Ping", "Diagnóstico"
          ou qualquer card que abra um painel sobreposto.
        finalScreenAssertion: >-
          Um bottom sheet ou overlay está aberto por cima da tela principal.

      - goal: Pressionar o botão Voltar do sistema para fechar o overlay
        hint: Use o gesto de voltar do Android (swipe da borda esquerda ou botão voltar)
        finalScreenAssertion: >-
          O overlay ou bottom sheet foi fechado. A tela principal (Home ou Velocidade)
          está visível novamente. O app não foi encerrado.

  - displayName: "[2.3] Navegação — swipe para baixo fecha bottom sheet"
    id: navegacao-swipe-sheet
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Abrir um bottom sheet no app (DNS, Ping, detalhe de rede ou similar)
        hint: Toque em qualquer card ou botão que abra um painel deslizante na parte inferior
        finalScreenAssertion: Um bottom sheet está aberto parcial ou totalmente.

      - goal: Deslizar o bottom sheet para baixo para fechá-lo
        hint: Segure no topo do sheet (indicador/drag handle) e arraste para baixo até fechar
        finalScreenAssertion: >-
          O bottom sheet foi fechado completamente. A tela anterior está visível
          e responsiva ao toque.

  - displayName: "[2.4] Navegação — layout da barra inferior está correto"
    id: layout-barra-inferior
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Verificar o layout e conteúdo da barra de navegação inferior
        hint: Observe as 5 abas na parte inferior da tela
        finalScreenAssertion: >-
          A barra de navegação inferior contém exatamente 5 abas com ícones e rótulos:
          "Início", "Velocidade", "Sinal", "Histórico" e "Ajustes".
          Cada aba tem ícone e texto visíveis. A aba ativa está destacada visualmente.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 3 — HOME / TELA INICIAL
  # Cobre: card de conexão Wi-Fi/móvel/offline, PathConnector, CGNAT,
  #        estado vazio sem histórico, cards de atalho
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[3.1] Home — card de conexão em Wi-Fi"
    id: home-wifi
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Na tela Início conectado a Wi-Fi, verificar as informações de rede exibidas
        hint: >-
          O card principal deve mostrar o nome da rede Wi-Fi (SSID), ícone de Wi-Fi
          e possivelmente velocidade do link ou qualidade do sinal.
        finalScreenAssertion: >-
          O card de conexão exibe o nome da rede Wi-Fi (SSID) e um indicador
          de qualidade ou sinal. Não exibe informações de operadora móvel
          como elemento principal.

  - displayName: "[3.2] Home — layout de atalhos e ferramentas"
    id: home-layout-atalhos
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Rolar a tela Home para baixo e verificar os atalhos de ferramentas
        hint: Deslize de baixo para cima para ver o conteúdo abaixo do card principal
        finalScreenAssertion: >-
          Atalhos para ferramentas estão visíveis abaixo do card principal,
          como DNS, Ping/Latência ou Diagnóstico. Cada atalho tem ícone e título.

      - goal: Verificar se há card ou seção de último resultado de velocidade
        hint: Procure um gráfico, card ou número indicando o último teste realizado
        finalScreenAssertion: >-
          Há uma seção mostrando o último resultado de velocidade ou uma área
          com o texto "Fazer primeiro teste" se nenhum teste foi realizado.

  - displayName: "[3.3] Home — estado sem histórico (primeiro uso)"
    id: home-sem-historico
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Verificar a seção de histórico/último resultado na tela Home
          sem nenhum teste realizado anteriormente
        hint: >-
          Procure por texto "Sem dados", "Fazer primeiro teste",
          "Nenhum teste realizado" ou botão para iniciar o primeiro teste.
        finalScreenAssertion: >-
          A seção de histórico exibe um estado vazio com mensagem humanizada
          e/ou botão para realizar o primeiro teste. Não mostra dados nulos
          nem valores zerados como se fossem resultados reais.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 4 — SPEEDTEST
  # Cobre: 3 modos, cancelamento, erro, dialog de dados móveis,
  #        layout do gauge, back durante execução, banner offline
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[4.1] Speedtest — seletor de modos e descrições"
    id: speedtest-layout-modos
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Navegar para a aba Velocidade e verificar os modos de teste disponíveis
        finalScreenAssertion: >-
          Três modos de teste estão visíveis: "Rápido", "Completo" e "Triplo"
          (ou equivalentes). Cada modo tem uma descrição com duração estimada.

      - goal: Selecionar o modo "Rápido" e verificar a descrição exibida
        hint: Toque no botão ou chip "Rápido"
        finalScreenAssertion: >-
          O modo Rápido está selecionado (destacado visualmente) e a descrição
          indica "Download e upload" com duração de aproximadamente 15 segundos.

      - goal: Selecionar o modo "Completo" e verificar a descrição exibida
        hint: Toque no botão ou chip "Completo"
        finalScreenAssertion: >-
          O modo Completo está selecionado e a descrição menciona
          download, upload, bufferbloat e DNS, com duração de ~60 segundos.

      - goal: Selecionar o modo "Triplo" e verificar a descrição exibida
        hint: Toque no botão ou chip "Triplo"
        finalScreenAssertion: >-
          O modo Triplo está selecionado e a descrição menciona
          3 medições com intervalos entre elas.

  - displayName: "[4.2] Speedtest — executar teste Rápido completo"
    id: speedtest-rapido
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Selecionar o modo Rápido e iniciar o teste de velocidade
        hint: Toque em "Rápido" depois em "Iniciar teste" ou no botão central
        finalScreenAssertion: >-
          O teste está em progresso mostrando um gauge ou indicador circular
          com o valor de velocidade atual. Um botão "Cancelar" está visível.

      - goal: Aguardar o teste concluir automaticamente
        hint: >-
          O teste dura ~15 segundos. Aguarde a tela de resultado aparecer
          com os valores finais de Download e Upload.
        finalScreenAssertion: >-
          A tela de resultado mostra valores numéricos de Download (Mbps)
          e Upload (Mbps). Um indicador de qualidade (letra A/B/C/D) ou
          badge colorido está visível.

  - displayName: "[4.3] Speedtest — dialog de confirmação em dados móveis"
    id: speedtest-dados-moveis-dialog
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Conectado em dados móveis, selecionar o modo "Completo" ou "Triplo"
          e tentar iniciar o teste
        hint: >-
          Selecione o modo Completo ou Triplo. Ao tocar em Iniciar, deve aparecer
          um diálogo de confirmação sobre consumo de dados.
        finalScreenAssertion: >-
          Um diálogo de alerta está visível avisando sobre o consumo de dados
          (aproximadamente 25-30 MB). O diálogo tem dois botões:
          um para confirmar e um para cancelar.

      - goal: Fechar o diálogo tocando no botão de cancelar
        hint: Toque em "Cancelar" ou "Agora não" no diálogo
        finalScreenAssertion: >-
          O diálogo foi fechado. A tela de Velocidade está visível com o modo
          Completo/Triplo ainda selecionado mas o teste não foi iniciado.

  - displayName: "[4.4] Speedtest — cancelar teste durante execução"
    id: speedtest-cancelamento
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Iniciar um teste de velocidade no modo Rápido
        hint: Selecione Rápido e toque em Iniciar
        finalScreenAssertion: O teste está em progresso com gauge animado.

      - goal: Tocar no botão "Cancelar" durante a execução do teste
        hint: O botão Cancelar deve estar visível durante a execução
        finalScreenAssertion: >-
          Um diálogo de confirmação pergunta se deseja interromper o teste,
          OU o teste foi cancelado diretamente e a tela voltou ao estado inicial.
          O app não travou nem exibiu tela de erro irrecuperável.

  - displayName: "[4.5] Speedtest — botão Voltar durante execução mostra confirmação"
    id: speedtest-back-durante-execucao
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Iniciar um teste de velocidade
        finalScreenAssertion: O teste está em execução com indicador de progresso visível.

      - goal: Pressionar o botão Voltar do sistema durante a execução do teste
        hint: Use o gesto de voltar do Android
        finalScreenAssertion: >-
          Um diálogo de confirmação aparece perguntando se deseja interromper o teste
          (ex.: "Interromper o teste?"). O teste não foi cancelado automaticamente
          sem confirmação do usuário.

  - displayName: "[4.6] Speedtest — banner de erro quando offline"
    id: speedtest-offline-banner
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Com o dispositivo sem conexão com a internet, navegar para a aba Velocidade
          e verificar o estado da tela
        hint: >-
          Sem conexão, a tela não deve mostrar o botão de iniciar normalmente.
          Deve exibir um banner ou mensagem indicando ausência de conexão.
        finalScreenAssertion: >-
          A tela de Velocidade exibe um banner ou mensagem informando que o teste
          está indisponível sem conexão ("Sem conexão", "Teste indisponível" ou similar).
          O botão de iniciar está desabilitado ou ausente.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 5 — RESULTADO DE VELOCIDADE
  # Cobre: grades A-D, inconclusivo, bufferbloat, compartilhar,
  #        chip de tipo de rede, OperadoraContactCard
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[5.1] Resultado — layout completo das métricas"
    id: resultado-layout
    prerequisiteTestCaseId: speedtest-rapido
    steps:
      - goal: Na tela de resultado do teste, verificar todas as métricas exibidas
        finalScreenAssertion: >-
          A tela mostra: (1) um indicador de qualidade com letra (A/B/C/D) colorido,
          (2) valor de Download em Mbps, (3) valor de Upload em Mbps,
          (4) valor de Ping/Latência em ms. Todos em português do Brasil.

      - goal: Verificar se há um chip ou badge indicando o tipo de rede do teste
        hint: Procure um badge/chip pequeno mostrando "Wi-Fi", "4G", "5G" ou "Rede móvel"
        finalScreenAssertion: >-
          Um badge ou chip com o tipo de conexão usado no teste está visível
          (ex: "Wi-Fi", "LTE", "5G"). O badge não está em branco nem mostrando "null".

  - displayName: "[5.2] Resultado — botões de ação pós-teste"
    id: resultado-acoes
    prerequisiteTestCaseId: speedtest-rapido
    steps:
      - goal: Na tela de resultado, verificar os botões disponíveis
        finalScreenAssertion: >-
          Pelo menos dois botões estão visíveis: "Testar novamente" e
          "Ir para home" (ou equivalentes). Ambos são tocáveis.

      - goal: Tocar em "Testar novamente" e verificar o retorno à tela de teste
        finalScreenAssertion: >-
          A tela de Velocidade está visível com o modo anterior selecionado
          e pronta para iniciar um novo teste.

  - displayName: "[5.3] Resultado — compartilhar resultado"
    id: resultado-compartilhar
    prerequisiteTestCaseId: speedtest-rapido
    steps:
      - goal: Na tela de resultado, encontrar e tocar no ícone ou botão de compartilhar
        hint: Geralmente um ícone de compartilhar no canto superior direito
        finalScreenAssertion: >-
          O sheet de compartilhamento do Android está aberto com opções de apps
          para compartilhar, OU um indicador de carregamento apareceu brevemente
          durante a geração da imagem de compartilhamento.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 6 — PING / LATÊNCIA
  # Cobre: happy path, erro e retry, progresso, layout do modal,
  #        swipe down para fechar
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[6.1] Ping — fluxo completo happy path"
    id: ping-happy-path
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Abrir a ferramenta de Ping/Latência
        hint: >-
          Procure um card ou botão "Ping", "Latência" ou "Ping/Latência"
          na tela Home ou na Central de Testes na aba Velocidade.
        finalScreenAssertion: >-
          O modal ou tela de Ping está aberto com título "Ping" ou similar,
          descrição do que a ferramenta faz e botão "Iniciar".

      - goal: Iniciar o teste de ping
        hint: Toque no botão "Iniciar"
        finalScreenAssertion: >-
          O teste está em progresso. Uma barra de progresso ou texto como
          "Coletando amostras — X de 20" está visível.

      - goal: Aguardar o teste concluir e verificar as três métricas
        finalScreenAssertion: >-
          Três métricas estão visíveis: Latência (ms), Jitter (ms) e
          Perda de Pacotes (%). Os valores são numéricos e estão em português.

  - displayName: "[6.2] Ping — layout do modal (indicador de arrasto)"
    id: ping-layout-modal
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Abrir a ferramenta de Ping e verificar o layout do modal
        finalScreenAssertion: >-
          O modal de Ping tem um indicador de arrasto (drag handle) no topo,
          um título, uma descrição e um botão de ação. O modal não ocupa
          a tela inteira — há espaço escurecido acima indicando que é um sheet.

  - displayName: "[6.3] Ping — testar novamente após conclusão"
    id: ping-retry
    prerequisiteTestCaseId: ping-happy-path
    steps:
      - goal: Após o teste de ping concluir, tocar em "Testar novamente"
        hint: Procure o botão "Testar novamente" ou "Repetir" na tela de resultado
        finalScreenAssertion: >-
          O teste recomeçou do zero. A barra de progresso voltou a 0
          e o contador de amostras reiniciou (ex: "1 de 20").

  - displayName: "[6.4] Ping — fechar modal com swipe para baixo"
    id: ping-fechar-swipe
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Abrir o modal de Ping
        finalScreenAssertion: O modal de Ping está aberto.

      - goal: Fechar o modal deslizando para baixo
        hint: Arraste o modal de cima para baixo até fechar
        finalScreenAssertion: >-
          O modal foi fechado. A tela que estava por baixo (Home ou Central de Testes)
          está visível e responsiva.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 7 — DNS BENCHMARK
  # Cobre: benchmark completo, estado de erro, guia (abrir/fechar),
  #        provedores brasileiros, layout da lista
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[7.1] DNS — benchmark completo com recomendação"
    id: dns-benchmark-completo
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Abrir a tela de DNS Benchmark
        hint: >-
          Procure card ou botão "DNS" na tela Home ou Central de Testes.
          Também pode estar na aba Sinal ou Ajustes.
        finalScreenAssertion: >-
          A tela de DNS está visível com lista de provedores DNS incluindo
          pelo menos Cloudflare, Google e provedores brasileiros (Registro.br ou CETIC.br).

      - goal: Iniciar o benchmark de DNS
        hint: Procure botão "Testar", "Medir", "Benchmark" ou similar
        finalScreenAssertion: >-
          O benchmark está em andamento. Texto como "Medindo servidores..." ou
          indicador de progresso está visível.

      - goal: Aguardar o benchmark concluir e verificar os resultados
        finalScreenAssertion: >-
          A lista de provedores mostra latência em ms para cada um.
          Um provedor está destacado como recomendado (badge, cor ou texto).

  - displayName: "[7.2] DNS — layout da lista de provedores"
    id: dns-layout-provedores
    prerequisiteTestCaseId: dns-benchmark-completo
    steps:
      - goal: Verificar se Registro.br e CETIC.br aparecem na lista de provedores
        hint: Role a lista para ver todos os 7 provedores
        finalScreenAssertion: >-
          A lista contém pelo menos 7 provedores DNS incluindo Registro.br e CETIC.br
          (provedores brasileiros). Cada item mostra nome do provedor e valor de latência.

  - displayName: "[7.3] DNS — abrir e verificar guia de configuração"
    id: dns-guia-abrir
    prerequisiteTestCaseId: dns-benchmark-completo
    steps:
      - goal: Encontrar e tocar no botão "Abrir guia completo" ou "Guia de configuração"
        hint: Geralmente um botão de texto ou link abaixo dos resultados
        finalScreenAssertion: >-
          O guia de configuração de DNS está visível com instruções em português
          sobre como aplicar o DNS recomendado no dispositivo ou roteador.

      - goal: Tocar em "Voltar" dentro do guia para retornar aos resultados
        hint: Procure botão "Voltar" ou "← Resultados" na tela do guia
        finalScreenAssertion: >-
          A tela de resultados do benchmark DNS voltou a ser exibida
          com os provedores e latências visíveis.

  - displayName: "[7.4] DNS — estado de erro com mensagem humanizada"
    id: dns-erro-mensagem
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Tentar iniciar o benchmark de DNS com conexão instável ou muito lenta
          e verificar a mensagem de erro caso o benchmark falhe
        hint: >-
          Se o benchmark falhar, deve aparecer uma mensagem de erro em português.
          Procure texto vermelho ou card de erro.
        finalScreenAssertion: >-
          Se o benchmark falhou: mensagem de erro em português como
          "Não consegui comparar DNS nesta conexão. Tente novamente quando a rede estabilizar."
          com botão para tentar novamente está visível.
          Se o benchmark concluiu com sucesso: os resultados normais estão visíveis.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 8 — FIBRA / MODEM (FTTH/GPON)
  # Cobre: análise em Wi-Fi, sem Wi-Fi, 4 tipos de erro, estados visuais
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[8.1] Fibra — acessar análise e verificar estados"
    id: fibra-acesso
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Navegar até a tela de análise do modem/ONT (Fibra)
        hint: >-
          Procure "Fibra", "Modem", "ONT" ou "Análise da Fibra" na aba Sinal,
          aba Velocidade ou Ajustes.
        finalScreenAssertion: >-
          A tela de análise do modem/ONT está visível. Exibe o estado atual:
          conectando, analisando, resultado com informações do modem,
          ou uma mensagem indicando por que a análise não está disponível.

  - displayName: "[8.2] Fibra — estado sem Wi-Fi (dados móveis)"
    id: fibra-sem-wifi
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Conectado em dados móveis (não Wi-Fi), abrir a tela de análise
          do modem/ONT e verificar a mensagem exibida
        hint: >-
          Em dados móveis, a análise do modem não está disponível.
          Deve aparecer mensagem humanizada explicando o motivo.
        finalScreenAssertion: >-
          A tela exibe uma mensagem humanizada em português informando que
          a análise do modem/ONT não está disponível sem conexão Wi-Fi.
          Não exibe erro técnico nem tela em branco.

  - displayName: "[8.3] Fibra — mensagem de erro quando modem inacessível"
    id: fibra-erro-modem
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Iniciar análise do modem e aguardar o resultado ou erro
        hint: Se conectado a Wi-Fi, a análise pode iniciar automaticamente ou com botão
        finalScreenAssertion: >-
          A tela mostra o resultado da análise com informações do modem,
          OU uma mensagem de erro humanizada se o modem for inacessível
          (ex: "Não foi possível acessar o modem", "Tempo de resposta esgotado"
          ou similar). Um botão de "Tentar novamente" deve estar visível no caso de erro.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 9 — DISPOSITIVOS CONECTADOS
  # Cobre: lista em Wi-Fi, MAC mascarado, estado sem Wi-Fi,
  #        lista vazia, layout dos cards
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[9.1] Dispositivos — lista em Wi-Fi com MAC mascarado"
    id: dispositivos-lista-wifi
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Navegar até a tela de Dispositivos conectados
        hint: Procure "Dispositivos", "Rede Local" ou ícone de dispositivos na aba Sinal ou Home
        finalScreenAssertion: >-
          A tela de Dispositivos está visível. Se conectado a Wi-Fi e há dispositivos
          na rede, a lista está sendo exibida. Se não há dispositivos, uma mensagem
          de estado vazio está visível.

      - goal: Verificar se os endereços MAC estão mascarados na lista de dispositivos
        hint: >-
          Procure endereços no formato XX:XX:XX:XX:XX:XX nos cards de dispositivos.
          Os octetos do meio devem estar ocultos (ex: XX:XX:••:••:YY:ZZ).
        finalScreenAssertion: >-
          Os endereços MAC nos cards de dispositivos estão parcialmente mascarados.
          Nenhum MAC completo de 6 octetos visíveis está exposto sem mascaramento.

  - displayName: "[9.2] Dispositivos — estado sem Wi-Fi (fallback)"
    id: dispositivos-sem-wifi
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Conectado em dados móveis (sem Wi-Fi ativo), abrir a tela de Dispositivos
          e verificar a mensagem exibida
        hint: Sem Wi-Fi, a lista de dispositivos da rede local não está disponível
        finalScreenAssertion: >-
          A tela de Dispositivos exibe uma mensagem humanizada em português
          explicando que a visualização de dispositivos requer conexão Wi-Fi.
          Não exibe lista vazia sem contexto nem erro técnico.

  - displayName: "[9.3] Dispositivos — layout do card de dispositivo"
    id: dispositivos-layout-card
    prerequisiteTestCaseId: dispositivos-lista-wifi
    steps:
      - goal: Verificar o conteúdo visual de um card de dispositivo na lista
        hint: >-
          Cada card deve mostrar nome ou tipo do dispositivo, endereço IP
          (possivelmente mascarado) e endereço MAC mascarado.
        finalScreenAssertion: >-
          Pelo menos um card de dispositivo mostra nome/tipo do dispositivo
          e informações de rede parcialmente mascaradas. O layout está organizado
          e não há texto cortado ou sobreposto.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 10 — TELA DE SINAL
  # Cobre: aba Redes, aba Canal, filtro de banda, detalhe de rede,
  #        BSSID mascarado, permissão de localização, dados móveis,
  #        pull-to-refresh
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[10.1] Sinal — aba Redes com lista de redes Wi-Fi"
    id: sinal-aba-redes
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Navegar para a aba Sinal e verificar a aba Redes
        finalScreenAssertion: >-
          A aba Sinal está visível com duas sub-abas: "Redes" e "Canal".
          A aba "Redes" está ativa mostrando lista de redes Wi-Fi detectadas
          ou mensagem de estado vazio.

      - goal: Verificar os filtros de banda disponíveis na aba Redes
        hint: >-
          Procure chips ou botões de filtro como "Todos", "2.4GHz", "5GHz", "6GHz"
        finalScreenAssertion: >-
          Filtros de banda estão visíveis: "Todos", "2.4GHz" e "5GHz" como mínimo.
          O filtro "Todos" está selecionado por padrão.

  - displayName: "[10.2] Sinal — filtro de banda filtra redes corretamente"
    id: sinal-filtro-banda
    prerequisiteTestCaseId: sinal-aba-redes
    steps:
      - goal: Tocar no filtro "2.4GHz" e verificar as redes listadas
        finalScreenAssertion: >-
          A lista foi filtrada mostrando apenas redes na banda 2.4GHz,
          ou mensagem informando que não há redes nessa banda.
          Nenhuma rede 5GHz aparece na lista filtrada.

      - goal: Tocar no filtro "5GHz" e verificar as redes listadas
        finalScreenAssertion: >-
          A lista foi filtrada para a banda 5GHz. A contagem de redes
          pode ser diferente da contagem em 2.4GHz.

      - goal: Tocar no filtro "Todos" para restaurar a lista completa
        finalScreenAssertion: >-
          Todas as redes voltaram a ser exibidas sem filtro de banda.

  - displayName: "[10.3] Sinal — detalhe de rede com BSSID mascarado"
    id: sinal-detalhe-bssid
    prerequisiteTestCaseId: sinal-aba-redes
    steps:
      - goal: Tocar em uma rede Wi-Fi na lista para ver o detalhe
        hint: Toque em qualquer item da lista de redes para abrir o bottom sheet de detalhes
        finalScreenAssertion: >-
          Um bottom sheet com detalhes da rede está aberto mostrando:
          SSID, força do sinal, banda, canal e BSSID.

      - goal: Verificar se o BSSID exibido está mascarado (parcialmente oculto)
        hint: >-
          BSSID é o endereço físico do roteador no formato XX:XX:XX:XX:XX:XX
        finalScreenAssertion: >-
          O BSSID exibido no detalhe da rede está parcialmente mascarado,
          mostrando apenas parte do endereço (ex: **:**:**:AA:BB:CC).
          O endereço completo não está exposto.

  - displayName: "[10.4] Sinal — aba Canal com análise de espectro"
    id: sinal-aba-canal
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Na tela Sinal, tocar na aba "Canal" para ver a análise de espectro
        finalScreenAssertion: >-
          A aba Canal está ativa mostrando análise de canais Wi-Fi
          ou solicitação de permissão de localização se necessário.

  - displayName: "[10.5] Sinal — estado sem permissão de localização"
    id: sinal-sem-permissao
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Na aba Sinal, verificar o comportamento quando a permissão
          de localização não foi concedida
        hint: >-
          Sem permissão de localização, pode aparecer um card ou sheet
          solicitando a permissão com contexto explicativo.
        finalScreenAssertion: >-
          Aparece uma mensagem contextual ou card explicando por que a
          permissão de localização é necessária e como concedê-la.
          A mensagem está em português e usa linguagem humanizada.

  - displayName: "[10.6] Sinal — pull-to-refresh atualiza a lista"
    id: sinal-pull-refresh
    prerequisiteTestCaseId: sinal-aba-redes
    steps:
      - goal: Na aba Redes, fazer pull-to-refresh puxando a lista para baixo
        hint: Toque na lista e arraste para baixo além do topo para acionar o refresh
        finalScreenAssertion: >-
          Um indicador de atualização (spinner ou pull-to-refresh visual) apareceu
          e a lista foi ou está sendo atualizada.

  - displayName: "[10.7] Sinal — dados móveis exibe card de sinal celular"
    id: sinal-dados-moveis
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Conectado em dados móveis (sem Wi-Fi), verificar o que a tela Sinal exibe
        hint: >-
          Em dados móveis, a aba Redes pode mostrar informações de sinal celular
          ou mensagem de que é necessário Wi-Fi para ver redes próximas.
        finalScreenAssertion: >-
          A tela Sinal em dados móveis exibe um card de sinal celular com
          informações da operadora e qualidade do sinal, OU uma mensagem
          informando que a funcionalidade de redes Wi-Fi requer Wi-Fi ativo.
          Não exibe lista vazia sem explicação.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 11 — HISTÓRICO
  # Cobre: estado vazio, lista com registros, filtros, filtro por operadora,
  #        detalhe de medição, exportar, layout do gráfico
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[11.1] Histórico — estado vazio no primeiro uso"
    id: historico-vazio
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Navegar para a aba Histórico sem nenhum teste realizado anteriormente
          e verificar o estado vazio
        finalScreenAssertion: >-
          A tela de Histórico exibe estado vazio com ícone, título como
          "Nenhum teste realizado ainda" e um botão "Fazer primeiro teste"
          ou equivalente. A tela não está em branco nem com dados zerados.

  - displayName: "[11.2] Histórico — lista com registros após teste"
    id: historico-com-registros
    prerequisiteTestCaseId: speedtest-rapido
    steps:
      - goal: Navegar para a aba Histórico após ter realizado um teste de velocidade
        finalScreenAssertion: >-
          Pelo menos um registro de medição aparece na lista do histórico
          com data, valores de download/upload e tipo de rede.

      - goal: Verificar se há gráfico de linha com a tendência do histórico
        hint: Procure um gráfico ou chart acima ou entre os registros
        finalScreenAssertion: >-
          Um gráfico de linha ou card de tendência está visível mostrando
          a evolução das medições ao longo do tempo.

  - displayName: "[11.3] Histórico — filtro por Wi-Fi"
    id: historico-filtro-wifi
    prerequisiteTestCaseId: historico-com-registros
    steps:
      - goal: Tocar no filtro "Wi-Fi" na tela de Histórico
        hint: Procure chips de filtro como "Todos", "Wi-Fi", "Rede móvel"
        finalScreenAssertion: >-
          A lista foi filtrada mostrando apenas medições realizadas em Wi-Fi,
          ou mensagem informando que não há medições Wi-Fi registradas.

      - goal: Tocar em "Todos" para remover o filtro
        finalScreenAssertion: >-
          Todos os registros voltam a ser exibidos sem filtro aplicado.

  - displayName: "[11.4] Histórico — filtro por rede móvel com chips de operadora"
    id: historico-filtro-movel
    prerequisiteTestCaseId: historico-com-registros
    steps:
      - goal: Tocar no filtro "Rede móvel" no Histórico
        finalScreenAssertion: >-
          A lista está filtrada para rede móvel. Se houver medições em rede móvel,
          chips adicionais com os nomes das operadoras aparecem para filtrar
          por operadora específica.

  - displayName: "[11.5] Histórico — detalhe de uma medição"
    id: historico-detalhe
    prerequisiteTestCaseId: historico-com-registros
    steps:
      - goal: Tocar em um registro do histórico para ver os detalhes
        hint: Toque em qualquer card da lista de histórico
        finalScreenAssertion: >-
          Um bottom sheet ou tela de detalhe abre mostrando métricas completas:
          Download, Upload, Latência, Jitter, Perda de pacotes e
          possivelmente Bufferbloat. Todos os valores em português.

      - goal: Fechar o detalhe com botão Voltar ou swipe para baixo
        finalScreenAssertion: >-
          O detalhe foi fechado. A lista de histórico está visível novamente.

  - displayName: "[11.6] Histórico — exportar histórico"
    id: historico-exportar
    prerequisiteTestCaseId: historico-com-registros
    steps:
      - goal: Encontrar e tocar no botão ou opção de exportar o histórico
        hint: Procure ícone de compartilhar, "Exportar" ou "Exportar histórico"
        finalScreenAssertion: >-
          Um bottom sheet de exportação está aberto com opções de formato
          (CSV, PDF ou similar) e botão para confirmar a exportação.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 12 — DIAGNÓSTICO / ASSISTENTE LINKA
  # Cobre: happy path, estado idle, linguagem humanizada,
  #        erro de IA offline, chat com pergunta
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[12.1] Diagnóstico — análise após speedtest"
    id: diagnostico-pos-teste
    prerequisiteTestCaseId: speedtest-rapido
    steps:
      - goal: Acessar o Assistente linka ou Diagnóstico inteligente após o speedtest
        hint: >-
          Pode estar na tela de resultado como botão "Ver diagnóstico",
          ou na tela Home como card "Diagnóstico". Toque para abrir.
        finalScreenAssertion: >-
          A tela do Assistente linka ou Diagnóstico está aberta com uma análise
          em texto sobre a qualidade da conexão. O texto está em português do Brasil.

      - goal: Verificar que a análise usa linguagem humanizada, não apenas números
        hint: Role o conteúdo para ver a análise completa
        finalScreenAssertion: >-
          A análise contém frases explicativas em linguagem natural como
          "sua conexão", "isso significa", "para o seu uso" ou similar.
          Não é apenas uma lista de métricas numéricas.

  - displayName: "[12.2] Diagnóstico — estado idle sem dados de teste"
    id: diagnostico-idle
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Abrir o Diagnóstico sem ter realizado nenhum teste de velocidade
        hint: Procure o acesso ao Diagnóstico na tela Home
        finalScreenAssertion: >-
          O Diagnóstico exibe um estado inicial (idle) com chamada para ação,
          como "Faça um teste de velocidade para ver a análise" ou similar.
          Não exibe análise vazia nem tela em branco.

  - displayName: "[12.3] Diagnóstico — enviar pergunta via chat"
    id: diagnostico-chat
    prerequisiteTestCaseId: speedtest-rapido
    steps:
      - goal: Abrir o Assistente linka/Diagnóstico e encontrar a área de chat
        hint: >-
          Pode haver um campo de texto para digitar perguntas ou uma lista
          de perguntas sugeridas.
        finalScreenAssertion: >-
          A interface de chat está visível com campo de texto ou perguntas
          sugeridas. O assistente está pronto para responder.

      - goal: Digitar ou selecionar uma pergunta sobre a conexão e enviar
        hint: >-
          Digite algo como "Por que minha velocidade está lenta?" ou toque
          em uma pergunta sugerida. Depois toque em "Enviar" ou similar.
        finalScreenAssertion: >-
          A pergunta foi enviada e uma resposta do assistente está sendo
          gerada (loading) ou já foi exibida. A resposta está em português
          do Brasil.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 13 — AJUSTES / CONFIGURAÇÕES
  # Cobre: editar perfil, configurar provedor, roteador, temas,
  #        gerenciar dados, redefinir app, ISP não configurado
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[13.1] Ajustes — layout da tela e seções"
    id: ajustes-layout
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Navegar para a aba Ajustes e verificar as seções disponíveis
        finalScreenAssertion: >-
          A tela de Ajustes mostra múltiplas seções com opções incluindo
          pelo menos: perfil/nome do usuário, configurações de conexão
          (provedor/plano), privacidade, dados locais e aparência/tema.

  - displayName: "[13.2] Ajustes — abrir e fechar sheet de edição de perfil"
    id: ajustes-perfil-sheet
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Tocar na área de perfil ou nome do usuário nos Ajustes
        hint: A área de perfil fica geralmente no topo da tela de Ajustes
        finalScreenAssertion: >-
          Um bottom sheet de edição de perfil está aberto com campos
          de nome e possivelmente foto de perfil.

      - goal: Fechar o sheet de perfil com botão Voltar ou swipe
        finalScreenAssertion: >-
          O sheet de perfil foi fechado. A tela de Ajustes está visível.

  - displayName: "[13.3] Ajustes — seleção de tema (claro/escuro/sistema)"
    id: ajustes-tema
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Encontrar o seletor de tema nos Ajustes
        hint: Procure opções "Tema", "Aparência", "Claro", "Escuro", "Sistema"
        finalScreenAssertion: >-
          As três opções de tema estão visíveis: sistema, claro e escuro.
          A opção atualmente ativa está destacada visualmente.

      - goal: Selecionar o tema "Escuro" e verificar a mudança visual
        hint: Toque na opção "Escuro" ou "Dark"
        finalScreenAssertion: >-
          O tema escuro foi aplicado. O fundo da tela de Ajustes ficou escuro.
          O texto e ícones têm contraste adequado com o fundo escuro.

      - goal: Reverter para o tema "Sistema"
        finalScreenAssertion: >-
          O tema voltou a seguir a configuração do sistema. A aparência visual
          pode ter mudado dependendo do tema do dispositivo.

  - displayName: "[13.4] Ajustes — dialog de confirmação ao redefinir app"
    id: ajustes-redefinir-dialog
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Encontrar e tocar na opção "Redefinir o app" nos Ajustes
        hint: Geralmente no final da lista, com texto em vermelho ou cor de alerta
        finalScreenAssertion: >-
          Um diálogo de confirmação está visível perguntando se deseja redefinir
          o app com aviso sobre perda de dados. Tem botões de confirmação e cancelar.

      - goal: Tocar em "Cancelar" no diálogo de redefinição
        finalScreenAssertion: >-
          O diálogo foi fechado. A tela de Ajustes está visível e nenhum dado
          foi apagado (o app não reiniciou nem voltou ao onboarding).

  - displayName: "[13.5] Ajustes — configurar velocidade contratada"
    id: ajustes-minha-conexao
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Tocar na opção "Minha conexão" ou "Configurar minha conexão" nos Ajustes
        hint: Pode estar em um item de lista ou banner "Toque para configurar"
        finalScreenAssertion: >-
          Um bottom sheet ou tela com campos para configurar a velocidade
          contratada (download/upload em Mbps), provedor de internet (operadora)
          e possivelmente cidade/estado está visível.

      - goal: Verificar o campo de plano e inserir um valor de velocidade
        hint: Procure campo para velocidade contratada em Mbps (apenas números)
        finalScreenAssertion: >-
          O campo de velocidade aceita apenas dígitos numéricos.
          Um valor como "300" ou "500" pode ser inserido no campo.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 14 — LAUDO / RELATÓRIO
  # Cobre: geração, dados mascarados, IP mascarado, compartilhamento
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[14.1] Laudo — acessar e verificar dados mascarados"
    id: laudo-dados-mascarados
    prerequisiteTestCaseId: speedtest-rapido
    steps:
      - goal: Encontrar e abrir a tela de Laudo ou Comprovante
        hint: >-
          Pode estar nos Ajustes como "Comprovante para Anatel", na tela de resultado
          do speedtest ou no Histórico.
        finalScreenAssertion: >-
          A tela de Laudo ou Comprovante está visível com os dados da medição.

      - goal: Verificar que o endereço IP local exibido no laudo está mascarado
        hint: >-
          O IP local (192.168.x.x) deve ter o último octeto oculto,
          como 192.168.1.*** ou similar.
        finalScreenAssertion: >-
          O endereço IP local no laudo está parcialmente mascarado.
          O último octeto não está visível. Ex: "192.168.1.***" ou similar.

  - displayName: "[14.2] Laudo — compartilhar comprovante"
    id: laudo-compartilhar
    prerequisiteTestCaseId: laudo-dados-mascarados
    steps:
      - goal: Tocar no botão de compartilhar o laudo
        hint: Procure ícone de compartilhar ou botão "Compartilhar laudo"
        finalScreenAssertion: >-
          O sheet de compartilhamento do Android está aberto com opções de apps
          para enviar o laudo, OU um indicador de geração do arquivo está visível.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 15 — PRIVACIDADE E MASCARAMENTO DE DADOS
  # Cobre: IP local, BSSID, MAC — verificação em telas diferentes
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[15.1] Privacidade — tela de Privacidade e dados"
    id: privacidade-tela
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Acessar a tela de Privacidade e dados nos Ajustes
        hint: Procure opção "Privacidade", "Privacidade e dados" ou similar nos Ajustes
        finalScreenAssertion: >-
          A tela de Privacidade está visível com informações sobre quais dados
          o app coleta e como os usa. O conteúdo está em português do Brasil.

  - displayName: "[15.2] Privacidade — IP mascarado na tela Home ou Sinal"
    id: privacidade-ip-mascarado
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Na tela Home ou Sinal, localizar o endereço IP local exibido
        hint: >-
          O IP local pode aparecer no card de conexão, informações de rede
          ou detalhes do gateway.
        finalScreenAssertion: >-
          O endereço IP local exibido está parcialmente mascarado.
          O último octeto está oculto (ex: 192.168.1.*** ou 10.0.0.***).

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 16 — ESTADOS OFFLINE E DEGRADAÇÃO GRACIOSA
  # Cobre: home offline, speedtest offline, app funcional sem permissões,
  #        troca de rede
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[16.1] Offline — Home exibe mensagem humanizada"
    id: offline-home
    steps:
      - goal: >-
          Com dispositivo sem conexão alguma (modo avião ativo ou sem Wi-Fi
          e sem dados móveis), abrir o app e verificar a tela Home
        finalScreenAssertion: >-
          A tela Home exibe uma mensagem clara em português sobre ausência de conexão
          (ex: "Você está offline", "Sem conexão" ou similar). A mensagem não é
          um erro técnico. A barra de navegação inferior está visível e funcional.

  - displayName: "[16.2] Offline — app continua navegável sem conexão"
    id: offline-navegacao
    prerequisiteTestCaseId: offline-home
    steps:
      - goal: Sem conexão, navegar para as abas Histórico e Ajustes
        finalScreenAssertion: >-
          As abas Histórico e Ajustes abrem normalmente. O app não travou
          nem exibiu tela de erro irrecuperável. Funcionalidades locais
          (como histórico já salvo) continuam acessíveis.

  - displayName: "[16.3] App funcional com todas as permissões negadas"
    id: permissoes-negadas-funcional
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Verificar que o app funciona nas funcionalidades básicas mesmo
          sem permissão de localização ou leitura de telefonia concedida
        hint: >-
          Navegue pela tela Home, Velocidade e Histórico sem ter concedido
          permissões avançadas. O app não deve exibir tela em branco nem erros.
        finalScreenAssertion: >-
          A tela Home e a aba Velocidade estão visíveis e funcionais.
          Funcionalidades que requerem permissão mostram mensagem contextual
          explicando o que é necessário — o restante do app funciona normalmente.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 17 — LINGUAGEM E LOCALIZAÇÃO
  # Cobre: PT-BR em todo o app, sem termos PT-PT, erros humanizados,
  #        termos técnicos com explicação
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[17.1] Linguagem — verificar PT-BR nas telas principais"
    id: linguagem-ptbr-principal
    prerequisiteTestCaseId: navegacao-abas
    steps:
      - goal: >-
          Percorrer as abas Início, Velocidade, Sinal, Histórico e Ajustes
          verificando os textos de títulos, botões e descrições
        finalScreenAssertion: >-
          Todos os textos visíveis nas 5 abas estão em português do Brasil.
          Nenhum texto em inglês não traduzido, nem termos de PT-PT como
          "utilizador", "ecrã" ou "telemóvel" estão presentes.

  - displayName: "[17.2] Linguagem — mensagens de erro em linguagem humana"
    id: linguagem-erros-humanizados
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: >-
          Provocar um estado de erro no app (ex: abrir Ping ou DNS com conexão
          instável, ou verificar mensagem quando sem Wi-Fi em tela que requer Wi-Fi)
        hint: Vá para a tela de Dispositivos ou Fibra sem estar em Wi-Fi
        finalScreenAssertion: >-
          A mensagem de erro exibida está em português do Brasil com explicação
          prática e humana do problema. Não mostra códigos de erro técnicos,
          stack traces ou mensagens em inglês como "null pointer exception" ou similar.

  # ══════════════════════════════════════════════════════════════════════════
  # BLOCO 18 — NOVIDADES E ORBIT
  # Cobre: tela de novidades, tela Orbit/LinkaPulse, navegação
  # ══════════════════════════════════════════════════════════════════════════

  - displayName: "[18.1] Novidades — acessar tela de novidades"
    id: novidades-acesso
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Encontrar e abrir a tela de Novidades do app
        hint: Pode estar nos Ajustes, na Home (badge de notificação) ou em menu
        finalScreenAssertion: >-
          A tela de Novidades está visível com conteúdo em português do Brasil.
          Exibe o changelog ou descrição das funcionalidades novas.
          Não está em branco ou com conteúdo de placeholder.

  - displayName: "[18.2] Orbit / Linka Pulse — acessar e verificar layout"
    id: orbit-acesso
    prerequisiteTestCaseId: onboarding-completo
    steps:
      - goal: Encontrar e abrir a tela Orbit ou Linka Pulse
        hint: >-
          Pode estar na tela Home como atalho, nos Ajustes ou em alguma
          área de destaque. Procure "Orbit", "Linka Pulse" ou ícone relacionado.
        finalScreenAssertion: >-
          A tela Orbit ou Linka Pulse está visível com conteúdo em português.
          O layout está organizado sem sobreposições ou texto cortado.
