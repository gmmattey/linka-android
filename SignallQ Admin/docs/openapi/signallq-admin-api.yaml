                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/401Error'

components:
  parameters:
    Period:
      name: period
      in: query
      schema:
        type: string
        enum: [24h, 7d, 30d, 90d]
      required: false
    StartDate:
      name: startDate
      in: query
      schema:
        type: string
        format: date
      required: false
    EndDate:
      name: endDate
      in: query
      schema:
        type: string
        format: date
      required: false
    Environment:
      name: environment
      in: query
      schema:
        type: string
        enum: [production, staging]
      required: false
    Country:
      name: country
      in: query
      schema:
        type: string
      required: false
    State:
      name: state
      in: query
      schema:
        type: string
      required: false
    City:
      name: city
      in: query
      schema:
        type: string
      required: false
    AppVersion:
      name: appVersion
      in: query
      schema:
        type: string
      required: false
    NetworkType:
      name: networkType
      in: query
      schema:
        type: string
      required: false
    Operator:
      name: operator
      in: query
      schema:
        type: string
      required: false
    AiProvider:
      name: aiProvider
      in: query
      schema:
        type: string
      required: false

  responses:
    400Error:
      description: The client specified unresolvable query criteria
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    401Error:
      description: Admin session cookies expired or unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    403Error:
      description: Authenticated but insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    429Error:
      description: Rate limited (too many login attempts)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Muitas tentativas. Tente novamente em 15 minutos."

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: |
        HTTPOnly session cookie (SIG-136).

        **Authentication Flow**:
        1. POST /auth/login with email + password
        2. Response includes Set-Cookie with 7-day session token
        3. Subsequent requests: browser automatically sends session cookie
        4. POST /auth/logout to revoke session

        **Password Security**: PBKDF2-SHA256 (100k iterations, pepper from ADMIN_AUTH_PEPPER)

        **Rate Limiting**: Max 5 login attempts per IP per 15 minutes

    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token for /ingest/* endpoints (app-only).

        **Token**: INGEST_KEY (from wrangler.toml secrets)

        **Scope**: Write-only, limited to POST /ingest/diagnostic, /ingest/ai-usage, /ingest/analytics

        **Lifetime**: Indefinite (rotate manually if compromised)

        **Purpose**: Reduces blast radius if APK is reverse-engineered. INGEST_KEY can only POST measurements, cannot read admin data.

    adminSecretAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token for /health endpoint (legacy, retrocompat only).

        **Token**: ADMIN_SECRET (from wrangler.toml secrets)

        **Status**: Deprecated (use session auth for /admin/*, Bearer INGEST_KEY for /ingest/*)

  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: string
      required: [code, message]

    OverviewMetricsResponse:
      type: object
      properties:
        totalDiagnosticsToday:
          type: integer
        activeUsersToday:
          type: integer
        estimatedAiCostToday:
          type: number
        totalDownloadsToday:
          type: integer
        averageCrashFreeUsersRate:
          type: number
        liveAppVersionInProduction:
