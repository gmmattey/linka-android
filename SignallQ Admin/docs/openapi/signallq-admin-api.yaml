          type: string
          enum: [admin, viewer]

    IngestResponse:
      type: object
      properties:
        ok:
          type: boolean
        ingested:
          type: integer
          description: Number of records ingested

    DiagnosticSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        network_type:
          type: string
          enum: [wifi, cellular, ethernet]
        status:
          type: string
          enum: [excelente, bom, regular, ruim, critico]
        score:
          type: integer
          minimum: 0
          maximum: 100
        download_mbps:
          type: number
        upload_mbps:
          type: number
        latency_ms:
          type: integer
        jitter_ms:
          type: integer
        packet_loss:
          type: number
        issues:
          type: array
          items:
            type: string
        operator:
          type: string
        device_model:
          type: string
