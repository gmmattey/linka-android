          type: number
        averageUploadMbps:
          type: number
        averageLatencyMs:
          type: number
        averageScore:
          type: number
        averageJitterMs:
          type: number
        averagePacketLossPercentage:
          type: number
      required: [totalTestsCount, criticalIssuesCount, attentionIssuesCount, averageScore]

    NetworkMetricsResponse:
      type: object
