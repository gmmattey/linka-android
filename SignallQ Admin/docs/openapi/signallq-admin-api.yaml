openapi: 3.0.3
info:
  title: SignallQ Admin Console API
  description: API endpoints for consolidating network telemetry, AI diagnostics, and app store metrics inside the SignallQ Admin dashboard.
  version: 1.0.0
servers:
  - url: https://api.signallq.internal/v1
    description: Production Admin Server
paths:
  /auth/login:
    post:
      summary: Login with email and password
      operationId: login
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "admin@signallq.com"
                password:
                  type: string
                  format: password
                  example: "SecureP@ssw0rd"
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "session=<token>; HttpOnly; Secure; SameSite=None; Path=/; Max-Age=604800"
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  role:
                    type: string
                    enum: ["admin", "viewer"]
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'
        '429':
          $ref: '#/components/responses/429Error'

  /auth/logout:
    post:
      summary: Logout and revoke session
      operationId: logout
      tags:
        - auth
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Logout successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "session=; HttpOnly; Secure; SameSite=None; Path=/; Max-Age=0"
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/401Error'

  /auth/me:
    get:
      summary: Get current authenticated user
      operationId: getMe
      tags:
        - auth
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    format: email
                  role:
                    type: string
                    enum: ["admin", "viewer"]
        '401':
          $ref: '#/components/responses/401Error'

  /auth/create-user:
    post:
      summary: Create a new admin user (admin-only)
      operationId: createUser
      tags:
        - auth
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "newadmin@signallq.com"
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'
        '403':
          $ref: '#/components/responses/403Error'

  /auth/change-password:
    post:
      summary: Change password for current user
      operationId: changePassword
      tags:
        - auth
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'
        '429':
          $ref: '#/components/responses/429Error'

  /ingest/diagnostic:
    post:
      summary: Ingest diagnostic measurement (app-only)
      operationId: ingestDiagnostic
      tags:
        - ingest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  description: Single diagnostic record
                - type: array
                  description: Array of diagnostic records (batch size max 50)
                  items:
                    type: object
              properties:
                id:
                  type: string
                created_at:
                  type: string
                  format: date-time
                network_type:
                  type: string
                status:
                  type: string
                  enum: ["excelente", "bom", "regular", "ruim", "critico"]
                download_mbps:
                  type: number
                upload_mbps:
                  type: number
                latency_ms:
                  type: integer
                jitter_ms:
                  type: integer
                packet_loss:
                  type: number
                operator:
                  type: string
                device_model:
                  type: string
                os_version:
                  type: string
                app_version:
                  type: string
                environment:
                  type: string
                  enum: ["production", "staging"]
      responses:
        '200':
          description: Diagnostics ingested
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  ingested:
                    type: integer
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'

  /ingest/ai-usage:
    post:
      summary: Ingest AI usage metrics (app-only)
      operationId: ingestAiUsage
      tags:
        - ingest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                session_id:
                  type: string
                  format: uuid
                prompt_tokens:
                  type: integer
                completion_tokens:
                  type: integer
                total_tokens:
                  type: integer
                cost_usd:
                  type: number
                environment:
                  type: string
                  enum: ["production", "staging"]
      responses:
        '200':
          description: Usage ingested
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/401Error'

  /ingest/analytics:
    post:
      summary: Ingest analytics events (app-only)
      operationId: ingestAnalytics
      tags:
        - ingest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Array of event records or single event
              properties:
                event_name:
                  type: string
                  example: "feature_used"
                timestamp:
                  type: string
                  format: date-time
                properties:
                  type: object
                  description: Event-specific properties
                user_id:
                  type: string
                session_id:
                  type: string
      responses:
        '200':
          description: Events ingested
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  ingested:
                    type: integer
        '401':
          $ref: '#/components/responses/401Error'

  /admin/metrics/overview:
    get:
      summary: Retrieve standard consolidated dashboard counters
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - $ref: '#/components/parameters/Environment'
        - $ref: '#/components/parameters/Country'
        - $ref: '#/components/parameters/State'
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/AppVersion'
      responses:
        '200':
          description: Dynamic overview stats from internal and connected properties
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewMetricsResponse'
        '400':
          $ref: '#/components/responses/400Error'
        '401':
          $ref: '#/components/responses/401Error'

  /admin/metrics/diagnostics:
    get:
      summary: Retrieve diagnostics history and analytical summaries
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
        - $ref: '#/components/parameters/NetworkType'
      responses:
        '200':
          description: List of telemetry tests and composite summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticsMetricsResponse'

  /admin/metrics/networks:
    get:
      summary: Aggregates regarding connection medium, SSID features, and physical attenuation
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
      responses:
        '200':
          description: Physical parameters and median latencies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkMetricsResponse'

  /admin/metrics/operators:
    get:
      summary: Retrieves telecom networks performance grouping (latencies, ISP ratings)
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
        - $ref: '#/components/parameters/Operator'
      responses:
        '200':
          description: Operator quality and tests volume
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorMetricsResponse'

  /admin/metrics/ai-usage:
    get:
      summary: Retrieves telemetry detailing LLM costs, fallbacks, and latencies
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
        - $ref: '#/components/parameters/AiProvider'
      responses:
        '200':
          description: Complete token count analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiUsageMetricsResponse'

  /admin/metrics/diagnostics/summary:
    get:
      summary: Diagnostic aggregations and summaries
      operationId: getDiagnosticsSummary
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
      responses:
        '200':
          description: Diagnostic summary metrics
          content:
            application/json:
              schema:
                type: object

  /admin/metrics/ai-costs:
    get:
      summary: AI costs by model and provider
      operationId: getAiCosts
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
      responses:
        '200':
          description: AI cost analytics
          content:
            application/json:
              schema:
                type: object

  /admin/metrics/ai-providers:
    get:
      summary: AI provider comparison and reliability
      operationId: getAiProviders
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200':
          description: Provider statistics
          content:
            application/json:
              schema:
                type: object

  /admin/metrics/ai-usage/timeline:
    get:
      summary: AI usage timeline (by day)
      operationId: getAiUsageTimeline
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
      responses:
        '200':
          description: Daily AI usage data
          content:
            application/json:
              schema:
                type: object

  /admin/metrics/timeline:
    get:
      summary: Test timeline (by day)
      operationId: getTestTimeline
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
      responses:
        '200':
          description: Daily test statistics
          content:
            application/json:
              schema:
                type: object

  /admin/metrics/alerts:
    get:
      summary: Recent alerts and critical issues
      operationId: getRecentAlerts
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200':
          description: List of recent alerts
          content:
            application/json:
              schema:
                type: object

  /admin/metrics/top-issues:
    get:
      summary: Top issues in period
      operationId: getTopIssues
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
      responses:
        '200':
          description: Top issues ranked by frequency
          content:
            application/json:
              schema:
                type: object

  /admin/metrics/errors:
    get:
      summary: Retrieves error logs from Cloudflare edge tunnels and local SDK exceptions
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
      responses:
        '200':
          description: Console details listing active error instances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMetricsResponse'

  /admin/metrics/app-versions:
    get:
      summary: Returns deployment history, crash stats from crashlytics and active Google Play Console rollout percentages
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
      responses:
        '200':
          description: Distribution breakdown by deployment track
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersionMetricsResponse'

  /admin/diagnostics/intelligence:
    get:
      summary: AI-powered diagnostic insights and patterns
      operationId: getDiagnosticsIntelligence
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Environment'
      responses:
        '200':
          description: AI-derived insights from diagnostics
          content:
            application/json:
              schema:
                type: object

  /admin/analytics/product:
    get:
      summary: Product engagement and feature usage analytics
      operationId: getProductAnalytics
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200':
          description: Product engagement metrics
          content:
            application/json:
              schema:
                type: object

  /admin/analytics/battery:
    get:
      summary: Battery drain and device analytics
      operationId: getBatteryAnalytics
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200':
          description: Battery and device statistics
          content:
            application/json:
              schema:
                type: object

  /admin/alerts:
    get:
      summary: Get all alerts (paginated)
      operationId: getAlerts
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated alert list
          content:
            application/json:
              schema:
                type: object

  /admin/alerts/{alertId}/resolve:
    post:
      summary: Mark alert as resolved
      operationId: resolveAlert
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Alert resolved
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/401Error'
        '404':
          description: Alert not found
          content:
            application/json:
              schema:
                type: object

  /admin/integrations/firebase:
    get:
      summary: Retrieves detailed Google Firebase telemetry connection status
      tags:
        - admin
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current sync times and active credential configurations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationStatus'

  /admin/integrations/firebase/analytics:
    get:
      summary: Firebase GA4 analytics data
      operationId: getFirebaseAnalytics
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200':
          description: GA4 analytics summary
          content:
            application/json:
              schema:
                type: object

  /admin/integrations/firebase/crashlytics:
    get:
      summary: Firebase Crashlytics error summary
      operationId: getFirebaseCrashlytics
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200':
          description: Crashlytics error logs
          content:
            application/json:
              schema:
                type: object

  /admin/integrations/firebase/versions:
    get:
      summary: App version stats from Firebase GA4
      operationId: getFirebaseVersions
      tags:
        - admin
      security:
        - cookieAuth: []
      responses:
        '200':
          description: App version distribution
          content:
            application/json:
              schema:
                type: object

  /admin/integrations/firebase/crash-issues:
    get:
      summary: Crashlytics grouped issues
      operationId: getFirebaseCrashIssues
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200':
          description: Grouped crash issues
          content:
            application/json:
              schema:
                type: object

  /admin/integrations/firebase/sync:
    post:
      summary: Manually trigger Firebase data sync
      operationId: triggerFirebaseSync
      tags:
        - admin
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Sync triggered
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/401Error'

  /admin/integrations/google-play:
    get:
      summary: Retrieves Google Play Developer API authorization state
      tags:
        - admin
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Play console credential flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationStatus'

  /admin/integrations/app-store:
    get:
      summary: App Store Connect future sync endpoint
      tags:
        - admin
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Planned state representation for external Apple imports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationStatus'

  /admin/settings:
    get:
      summary: Queries baseline variables configured for edge processing
      tags:
        - admin
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Active control parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettings'
    patch:
      summary: Configures control metrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettings'
      responses:
        '200':
          description: Variables configured successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettings'
    put:
      summary: Update configuration
      operationId: updateSettings
      tags:
        - admin
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettings'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettings'
        '401':
          $ref: '#/components/responses/401Error'
        '403':
          $ref: '#/components/responses/403Error'

  /admin/feature-flags:
    get:
      summary: List all feature flags
      operationId: listFeatureFlags
      tags:
        - admin
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of all feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  flags:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/401Error'

  /admin/feature-flags/{flagName}:
    put:
      summary: Update feature flag state
      operationId: updateFeatureFlag
      tags:
        - admin
      security:
        - cookieAuth: []
      parameters:
        - name: flagName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                rolloutPercent:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        '200':
          description: Flag updated
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/401Error'
        '403':
          $ref: '#/components/responses/403Error'

  /health:
    get:
      summary: Worker health check
      operationId: health
      tags:
        - health
      security:
        - adminSecretAuth: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/401Error'

components:
  parameters:
    Period:
      name: period
      in: query
      schema:
        type: string
        enum: [24h, 7d, 30d, 90d]
      required: false
    StartDate:
      name: startDate
      in: query
      schema:
        type: string
        format: date
      required: false
    EndDate:
      name: endDate
      in: query
      schema:
        type: string
        format: date
      required: false
    Environment:
      name: environment
      in: query
      schema:
        type: string
        enum: [production, staging]
      required: false
    Country:
      name: country
      in: query
      schema:
        type: string
      required: false
    State:
      name: state
      in: query
      schema:
        type: string
      required: false
    City:
      name: city
      in: query
      schema:
        type: string
      required: false
    AppVersion:
      name: appVersion
      in: query
      schema:
        type: string
      required: false
    NetworkType:
      name: networkType
      in: query
      schema:
        type: string
      required: false
    Operator:
      name: operator
      in: query
      schema:
        type: string
      required: false
    AiProvider:
      name: aiProvider
      in: query
      schema:
        type: string
      required: false

  responses:
    400Error:
      description: The client specified unresolvable query criteria
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    401Error:
      description: Admin session cookies expired or unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    403Error:
      description: Authenticated but insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    429Error:
      description: Rate limited (too many login attempts)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Muitas tentativas. Tente novamente em 15 minutos."

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: |
        HTTPOnly session cookie (SIG-136).

        **Authentication Flow**:
        1. POST /auth/login with email + password
        2. Response includes Set-Cookie with 7-day session token
        3. Subsequent requests: browser automatically sends session cookie
        4. POST /auth/logout to revoke session

        **Password Security**: PBKDF2-SHA256 (100k iterations, pepper from ADMIN_AUTH_PEPPER)

        **Rate Limiting**: Max 5 login attempts per IP per 15 minutes

    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token for /ingest/* endpoints (app-only).

        **Token**: INGEST_KEY (from wrangler.toml secrets)

        **Scope**: Write-only, limited to POST /ingest/diagnostic, /ingest/ai-usage, /ingest/analytics

        **Lifetime**: Indefinite (rotate manually if compromised)

        **Purpose**: Reduces blast radius if APK is reverse-engineered. INGEST_KEY can only POST measurements, cannot read admin data.

    adminSecretAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token for /health endpoint (legacy, retrocompat only).

        **Token**: ADMIN_SECRET (from wrangler.toml secrets)

        **Status**: Deprecated (use session auth for /admin/*, Bearer INGEST_KEY for /ingest/*)

  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: string
      required: [code, message]

    OverviewMetricsResponse:
      type: object
      properties:
        totalDiagnosticsToday:
          type: integer
        activeUsersToday:
          type: integer
        estimatedAiCostToday:
          type: number
        totalDownloadsToday:
          type: integer
        averageCrashFreeUsersRate:
          type: number
        liveAppVersionInProduction:
          type: string
        activeInstallsCount:
          type: integer
      required: [totalDiagnosticsToday, activeUsersToday, estimatedAiCostToday, totalDownloadsToday, averageCrashFreeUsersRate, liveAppVersionInProduction, activeInstallsCount]

    DiagnosticsMetricsResponse:
      type: object
      properties:
        totalTestsCount:
          type: integer
        criticalIssuesCount:
          type: integer
        attentionIssuesCount:
          type: integer
        averageDownloadMbps:
          type: number
        averageUploadMbps:
          type: number
        averageLatencyMs:
          type: number
        averageScore:
          type: number
        averageJitterMs:
          type: number
        averagePacketLossPercentage:
          type: number
      required: [totalTestsCount, criticalIssuesCount, attentionIssuesCount, averageScore]

    NetworkMetricsResponse:
      type: object
      properties:
        wifiAnalysedCount:
          type: integer
        cellTowersCount:
          type: integer
        physicalBadSignalRate:
          type: number
        mediumAverages:
          type: array
          items:
            type: object
            properties:
              medium:
                type: string
              averageLatency:
                type: number
              packetLoss:
                type: number
              interference:
                type: number
      required: [wifiAnalysedCount, cellTowersCount, physicalBadSignalRate, mediumAverages]

    OperatorMetricsResponse:
      type: object
      properties:
        operators:
          type: array
          items:
            type: object
            properties:
              operatorName:
                type: string
              testCount:
                type: integer
              averageLatencyMs:
                type: number
              downloadMbps:
                type: number
              uploadMbps:
                type: number
      required: [operators]

    AiUsageMetricsResponse:
      type: object
      properties:
        totalTokensConsumed:
          type: integer
        accumulatedCostUsd:
          type: number
        averageModelLatencyMs:
          type: number
        successRatePercentage:
          type: number
      required: [totalTokensConsumed, accumulatedCostUsd, averageModelLatencyMs, successRatePercentage]

    ErrorMetricsResponse:
      type: object
      properties:
        errorsArray:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              message:
                type: string
              source:
                type: string
              count:
                type: integer
              affectedUsers:
                type: integer
              resolved:
                type: boolean
      required: [errorsArray]

    AppVersionMetricsResponse:
      type: object
      properties:
        versions:
          type: array
          items:
            type: object
            properties:
              versionCode:
                type: string
              buildNumber:
                type: integer
              platform:
                type: string
              source:
                type: string
              activeUsersPercent:
                type: number
              successRatePercent:
                type: number
              crashesCount:
                type: integer
              anrsCount:
                type: integer
              diagnosticErrors:
                type: integer
              aiErrors:
                type: integer
              releaseStatus:
                type: string
              rolloutPercentage:
                type: number
              releaseDate:
                type: string
      required: [versions]

    AdminSettings:
      type: object
      properties:
        selectedDefaultAiModel:
          type: string
        aiFallbackEnabled:
          type: boolean
        maxTokensPerDiagnostic:
          type: integer
        speedtestIntervalSeconds:
          type: integer
        androidLogsCollectionEnabled:
          type: boolean
        stagingAlertWebhookChannel:
          type: string
        productionAlertWebhookChannel:
          type: string
        cloudflareWorkerEndpoint:
          type: string
      required: [selectedDefaultAiModel, aiFallbackEnabled, maxTokensPerDiagnostic, speedtestIntervalSeconds]

    IntegrationStatus:
      type: object
      properties:
        enabled:
          type: boolean
        status:
          type: string
