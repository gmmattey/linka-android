          type: string
        created_at:
          type: string
          format: date-time
        severity:
          type: string
          enum: [critical, high, medium, low]
        title:
          type: string
        description:
          type: string
        resolved:
          type: boolean
        resolved_at:
          type: string
          format: date-time

    # Firebase Integration Schemas (SIG-169)
    FirebaseStatus:
      type: object
      description: Firebase connection status and credential configuration
      properties:
        source:
          type: string
          example: "worker"
          description: Response source (worker = local check, no external API call)
        projectId:
          type: string
          example: "signallq-analytics-prod"
          description: Firebase Project ID
        status:
          type: string
          example: "connected"
          enum: [connected, disconnected]
        hasCredentials:
          type: boolean
          example: true
          description: Whether service account credentials are configured
        ga4PropertyConfigured:
          type: boolean
          example: true
          description: Whether GA4 property ID is configured
      required: [source, projectId, status, hasCredentials, ga4PropertyConfigured]

    FirebaseAnalyticsResponse:
      type: object
      description: GA4 analytics metrics (7-day window)
      properties:
        source:
          type: string
          example: "firebase_analytics"
          enum: [firebase_analytics, no_credentials, no_ga4_property_id, error]
        data:
          type: object
          description: Raw Analytics Reporting API response (when source=firebase_analytics)
          properties:
            rows:
              type: array
              items:
                type: object
                properties:
                  dimensions:
                    type: array
                    items:
                      type: string
                    example: ["2026-06-21"]
                  metricValues:
                    type: array
                    items:
                      type: object
                      properties:
                        value:
                          type: string
                    example: [{"value": "1234"}, {"value": "5678"}, {"value": "89"}]

    FirebaseCrashlyticsResponse:
      type: object
      description: Crashlytics crash summary (7-day window)
      properties:
        source:
          type: string
          enum: [bigquery, no_credentials, no_data_yet, error]
          example: "bigquery"
        unresolvedCrashes:
          type: integer
          example: 42
          description: Count of distinct crashes in 7-day window
        affectedUsers:
          type: integer
          example: 12
          description: Count of unique devices affected by crashes
        crashFreeUsersPercentage:
          type: number
          example: 98.5
          description: Percentage of users not affected by crashes
      required: [source, unresolvedCrashes, affectedUsers, crashFreeUsersPercentage]

    FirebaseVersion:
      type: object
      description: App version with crash stats
      properties:
        version:
          type: string
          example: "0.21.0"
        totalCrashes:
          type: integer
          example: 42
        affectedUsers:
          type: integer
          example: 8

    FirebaseVersionsResponse:
      type: object
      description: App version distribution (30-day window, top 10)
      properties:
        source:
          type: string
          enum: [bigquery, no_credentials, no_data_yet, error]
          example: "bigquery"
        versions:
          type: array
          items:
            $ref: '#/components/schemas/FirebaseVersion'
      required: [source, versions]

    FirebaseCrashIssue:
      type: object
      description: Grouped crash issue
      properties:
        id:
          type: string
          example: "NullPointerException"
        title:
          type: string
          example: "NullPointerException in DiagnosticViewModel"
        totalCrashes:
          type: integer
          example: 156
        affectedUsers:
          type: integer
          example: 42
        lastSeen:
          type: integer
          format: unix-timestamp
          example: 1719457200
          description: Last crash timestamp in seconds

    FirebaseCrashIssuesResponse:
      type: object
      description: Grouped crash issues (30-day window, top 20)
      properties:
        source:
          type: string
          enum: [bigquery, no_credentials, no_data_yet, error]
          example: "bigquery"
        issues:
          type: array
          items:
            $ref: '#/components/schemas/FirebaseCrashIssue'
      required: [source, issues]

    FirebaseSyncResponse:
      type: object
      description: Firebase sync result
      properties:
        ok:
          type: boolean
          example: true
        source:
          type: string
          enum: [bigquery, no_credentials, no_data_yet, error]
          example: "bigquery"
        sessionsYesterday:
          type: integer
          example: 5432
          description: Session count from yesterday (GA4)
        syncedAt:
          type: integer
          format: unix-timestamp
          example: 1719457200
          description: Sync timestamp in seconds
      required: [ok, source, syncedAt]

x-changelog: |
  ## Version History

  ### v2.0.0 (27.06.2026) — SIG-166, SIG-167, SIG-168, SIG-169

  #### Phase 1: Endpoint Documentation (SIG-166)
  - **Added**: 22+ missing endpoints
    - All /auth/* endpoints (5): login, logout, me, create-user, change-password
    - All /ingest/* endpoints (3): diagnostic, ai-usage, analytics
    - All /admin/metrics/* endpoints (12+): ai-costs, ai-providers, ai-usage/timeline, timeline, alerts, top-issues, etc.
    - All /admin/analytics/* endpoints (2): product, battery
    - All /admin/integrations/firebase/* endpoints (6): analytics, crashlytics, versions, crash-issues, sync
    - /admin/diagnostics/intelligence, /admin/alerts/*, /admin/feature-flags/*, /health, PUT /admin/settings

  #### Phase 2: Authentication Documentation (SIG-167)
  - **Added**: Complete auth documentation
    - securitySchemes: cookieAuth (session), bearerAuth (ingest), adminSecretAuth (legacy)
    - Password hashing: PBKDF2-SHA256 (100k iterations)
    - Rate limiting: 5 attempts / 15 minutes
    - Firebase service account JWT flow

  #### Phase 3: Firebase Integration (SIG-169)
  - **Enhanced**: Firebase endpoints with complete schemas
    - GET /admin/integrations/firebase/status — connection health
    - GET /admin/integrations/firebase/analytics — GA4 metrics (7d)
    - GET /admin/integrations/firebase/crashlytics — crash summary (7d)
    - GET /admin/integrations/firebase/versions — version distribution (30d)
    - GET /admin/integrations/firebase/crash-issues — grouped crashes (30d)
    - POST /admin/integrations/firebase/sync — manual sync trigger
  - **Documented**: BigQuery queries, service account auth, error responses

  #### Phase 4: Path Consolidation (SIG-168)
  - **Added**: Consolidated paths for analytics/reporting
    - /admin/metrics/intelligence — consolidate from /admin/diagnostics/intelligence
    - /admin/metrics/analytics/product — consolidate from /admin/analytics/product
    - /admin/metrics/analytics/battery — consolidate from /admin/analytics/battery
  - **Deprecated** (backward compatible until v3.0.0):
    - /admin/diagnostics/intelligence (use /admin/metrics/intelligence)
    - /admin/analytics/product (use /admin/metrics/analytics/product)
    - /admin/analytics/battery (use /admin/metrics/analytics/battery)
  - **Clarified**: API structure (analytics/reporting under /admin/metrics/*, business logic separate)

  #### General Changes
  - **Changed**: version → 2.0.0
  - **Removed**: /v1 prefix (not in actual implementation; use /admin/*, /auth/*, /ingest/* directly)
  - **Documented**: Complete path structure and security model

  ### v1.0.0 (Initial)
  - 25 basic endpoints
  - Incomplete auth documentation
  - Missing 17+ endpoints

x-implementation-notes: |
  ## Implementation Notes

  - **No version prefix**: Actual Worker uses /admin/*, /auth/*, /ingest/* directly (no /v1)
  - **Auth**: 3 distinct schemes (session for /admin/*, Bearer for /ingest/*, Bearer legacy for /health)
  - **Rate limiting**: Applied to /auth/* endpoints only (IP-based, 5 attempts/15min)
  - **INGEST_KEY scope**: Write-only /ingest/* (cannot read admin data, reduces APK compromise blast radius)
  - **Database**: D1 (Cloudflare) for admin data, Firebase for analytics
  - **Async operations**: Some endpoints like /admin/integrations/firebase/sync are fire-and-forget
  - **Response schemas**: See /components/schemas/ for complete data models
  - **CORS**: Enabled; credentials allowed via Set-Cookie (httpOnly, Secure, SameSite=None)
