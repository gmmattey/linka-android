<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<style>
  body{margin:0;background:var(--bg-primary);font-family:var(--font-sans);padding:24px;}
  .cap{font:600 11px/1.3 var(--font-sans);color:var(--text-tertiary);letter-spacing:.3px;text-transform:uppercase;margin-bottom:16px;}
  .row{display:flex;gap:26px;align-items:flex-end;}
  .item{text-align:center;}
  .c{border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;}
  .v{font:400 11px/1.3 var(--font-sans);color:var(--text-secondary);margin-top:9px;}
</style></head><body>
  <div class="cap">Ícone em chip circular (cor @10%)</div>
  <div class="row">
    <div class="item"><div class="c" style="width:80px;height:80px;background:rgba(108,43,255,.10);color:var(--accent)"><span class="material-symbols-outlined" style="font-size:38px">public</span></div><div class="v">80dp · empty state</div></div>
    <div class="item"><div class="c" style="width:44px;height:44px;background:rgba(34,197,94,.10);color:var(--success)"><span class="material-symbols-outlined" style="font-size:22px">wifi</span></div><div class="v">44dp · signal</div></div>
    <div class="item"><div class="c" style="width:36px;height:36px;background:rgba(245,166,35,.10);color:var(--warning)"><span class="material-symbols-outlined" style="font-size:20px">cell_tower</span></div><div class="v">36dp · friendly</div></div>
    <div class="item"><div class="c" style="width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent-blue));color:#fff;font:700 16px/1 var(--font-sans)">L</div><div class="v">avatar · gradiente</div></div>
  </div>
</body></html>
