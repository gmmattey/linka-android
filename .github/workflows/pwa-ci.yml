name: PWA CI

on:
  push:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/pwa-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/pwa-ci.yml'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Check if PWA is initialized
        id: pwa-check
        run: |
          if [ -f pwa/package.json ]; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.pwa-check.outputs.initialized == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package.json

      - name: Install dependencies
        if: steps.pwa-check.outputs.initialized == 'true'
        run: cd pwa && npm ci

      - name: Run build
        if: steps.pwa-check.outputs.initialized == 'true'
        run: cd pwa && npm run build

      - name: Run tests (if available)
        if: steps.pwa-check.outputs.initialized == 'true'
        run: cd pwa && npm run test 2>/dev/null || echo "No test script found, skipping"

      - name: PWA not initialized
        if: steps.pwa-check.outputs.initialized == 'false'
        run: echo "⚠️  PWA project not yet initialized (no pwa/package.json found). Skipping CI."

      - name: Upload build output
        if: steps.pwa-check.outputs.initialized == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-build
          path: pwa/dist/
          if-no-files-found: ignore
