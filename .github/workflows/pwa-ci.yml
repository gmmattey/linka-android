name: PWA CI

on:
  push:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/pwa-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/pwa-ci.yml'

permissions:
  contents: read

concurrency:
  group: pwa-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: pwa

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint if configured
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script found; skipping."
          fi

      - name: Run validation
        run: npm run verify

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-build
          path: pwa/dist/
          if-no-files-found: ignore

  # GH#443: o deploy de producao deste app deixou de ser isolado (projeto
  # Cloudflare Pages `signallq-pwa`, que nunca chegou a existir de fato — ver
  # pwa/docs/deploy-status.md) e passou a ser publicado junto com o Console
  # Admin sob /app e /console no projeto unico `signallq`. Ver
  # .github/workflows/pages-deploy.yml e deploy/pages/README.md.
