name: PWA CI

on:
  push:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/pwa-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/pwa-ci.yml'

permissions:
  contents: read

concurrency:
  group: pwa-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: pwa

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: pwa
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint if configured
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script found; skipping."
          fi

      - name: Run validation
        run: npm run verify

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-build
          path: pwa/dist/
          if-no-files-found: ignore

  cloudflare-pages:
    name: Cloudflare Pages Preview/Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare secrets
        id: cloudflare
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured; skipping Pages deploy."
          fi

      - name: Setup Node.js
        if: steps.cloudflare.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        if: steps.cloudflare.outputs.enabled == 'true'
        run: npm ci

      - name: Build Pages artifact
        if: steps.cloudflare.outputs.enabled == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare.outputs.enabled == 'true'
        run: npm run pages:deploy -- --branch="$DEPLOY_BRANCH"
