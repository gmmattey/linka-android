name: Auto-mover board

# Safety net: move o card no Project quando algo muda no GitHub
# fora do controle dos agentes locais (PR aberto/mergeado, issue fechada, label trocada).
#
# Funciona em conjunto com scripts/issue-move.sh (chamado pelos agentes).

on:
  issues:
    types: [opened, reopened, closed, labeled, unlabeled]
  pull_request:
    types: [opened, reopened, closed, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

env:
  PROJECT_OWNER: "gmmattey"
  # Projects reais por produto (decisao 2026-07-21, ver .claude/CLAUDE.md secao "Fontes da Verdade").
  # Project #8 "LINKA Android -- Roadmap" e legado (marca anterior ao rebrand) e nao e mais escrito aqui.
  PROJECT_10_ID: "PVT_kwHOD83n7c4Bd-Yz"   # SignallQ
  FIELD_10: "PVTSSF_lAHOD83n7c4Bd-YzzhYb_h4"
  PROJECT_11_ID: "PVT_kwHOD83n7c4Bd-Y0"   # SignallQ PRO
  FIELD_11: "PVTSSF_lAHOD83n7c4Bd-Y0zhYb_is"
  PROJECT_12_ID: "PVT_kwHOD83n7c4Bd-Y1"   # SignallQ Admin
  FIELD_12: "PVTSSF_lAHOD83n7c4Bd-Y1zhYb_jg"
  PROJECT_13_ID: "PVT_kwHOD83n7c4Bd-ZN"   # SignallQ Site
  FIELD_13: "PVTSSF_lAHOD83n7c4Bd-ZNzhYb_4U"
  # Mesmas 3 opcoes de Status em todos os projects acima (schema compartilhado).
  OPT_TODO: "f75ad846"
  OPT_IN_PROGRESS: "47fc9ee4"
  OPT_DONE: "98236657"

jobs:
  move-card:
    runs-on: ubuntu-latest
    steps:
      - name: Decide coluna alvo
        id: decide
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          ISSUE_LABELS: ${{ toJSON(github.event.issue.labels) }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          set -e
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          TARGET=""
          NUM=""

          if [ "$EVENT" = "issues" ]; then
            NUM="${{ github.event.issue.number }}"
            case "$ACTION" in
              opened|reopened) TARGET="$OPT_TODO" ;;
              closed) TARGET="$OPT_DONE" ;;
              labeled|unlabeled)
                LABEL="$LABEL_NAME"
                case "$LABEL" in
                  status:agent-ready) [ "$ACTION" = labeled ] && TARGET="$OPT_TODO" ;;
                  status:in-progress) [ "$ACTION" = labeled ] && TARGET="$OPT_IN_PROGRESS" ;;
                  status:waiting-review) [ "$ACTION" = labeled ] && TARGET="$OPT_IN_PROGRESS" ;;
                  status:blocked) [ "$ACTION" = labeled ] && TARGET="$OPT_TODO" ;;
                esac
                ;;
            esac
          elif [ "$EVENT" = "pull_request" ]; then
            # Extrai numero da issue via env vars -- evita injecao de shell com PR body livre.
            # So casa a keyword de fechamento reconhecida pelo GitHub (closes/fixes/resolves
            # etc.) seguida de #N -- nunca um "#N" solto no texto, que pode ser qualquer coisa
            # (ex.: cor hex "#131217" mencionada na descricao, que ja quebrou isso uma vez, ver
            # PR #1186). Usa a ULTIMA ocorrencia (tail -1): a convencao real do repo (visivel em
            # praticamente toda PR do squad) e colocar o "Closes #N" de verdade como linha final
            # do corpo -- qualquer mencao a "closes/fixes #N" mais acima costuma ser prosa citando
            # outro bug/PR, nao o fechamento real desta. Essa PR mesma provou o caso: o corpo cita
            # "Closes #1184" (o bug original) explicando o problema, antes do "Closes #1190" real
            # no rodape -- com head -1 o job teria pego 1184 de novo.
            NUM=$(printf '%s %s' "$PR_BODY" "$PR_TITLE" \
              | grep -oiE '\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\b:?[[:space:]]+#[0-9]+' \
              | grep -oE '[0-9]+' \
              | tail -1)
            if [ -n "$NUM" ]; then
              case "$ACTION" in
                opened|reopened|ready_for_review) TARGET="$OPT_IN_PROGRESS" ;;
                closed)
                  if [ "$PR_MERGED" = "true" ]; then
                    TARGET="$OPT_DONE"
                  fi
                  ;;
              esac
            fi
          fi

          echo "num=$NUM" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Atualizar Project
        if: steps.decide.outputs.target != '' && steps.decide.outputs.num != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          NUM: ${{ steps.decide.outputs.num }}
          TARGET: ${{ steps.decide.outputs.target }}
        run: |
          set -e

          # Retry com backoff -- runs concorrentes (ex.: varias issues fechadas juntas) podem
          # esbarrar em rate-limit intermitente da API de Projects ("unknown owner type" e o
          # jeito capenga do gh CLI reportar isso). Ver incidente 2026-07-23.
          retry() {
            local attempt=1 max=4 delay=3
            until "$@"; do
              if [ "$attempt" -ge "$max" ]; then
                echo "::error::comando falhou apos $max tentativas: $*"
                return 1
              fi
              echo "tentativa $attempt falhou, retry em ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          # Roteia por label product:* -- issue pode estar em mais de um Project.
          # Sem label product:* (nao deveria acontecer, ver .claude/CLAUDE.md secao "Hierarquia
          # obrigatoria por Project"), cai em SignallQ (#10) como default e loga o gap.
          RAW_LABELS=$(gh issue view "$NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | map(select(startswith("product:"))) | join(",")')
          PRODUCT_LABELS=",$RAW_LABELS,"
          if [ "$PRODUCT_LABELS" = ",," ]; then
            echo "::warning::issue #$NUM sem label product:* -- default para Project #10 (SignallQ)"
            PRODUCT_LABELS=",product:signallq,"
          fi

          move_in_project() {
            local proj_num="$1" proj_id="$2" field_id="$3"
            local item_id
            item_id=$(retry gh project item-list "$proj_num" --owner "$PROJECT_OWNER" \
              --format json --limit 200 \
              --jq ".items[] | select(.content.number == $NUM) | .id")

            if [ -z "$item_id" ]; then
              item_id=$(retry gh project item-add "$proj_num" --owner "$PROJECT_OWNER" \
                --url "https://github.com/${{ github.repository }}/issues/$NUM" \
                --format json --jq '.id')
            fi

            retry gh project item-edit --project-id "$proj_id" --id "$item_id" \
              --field-id "$field_id" --single-select-option-id "$TARGET"

            echo "#$NUM movida no Project #$proj_num"
          }

          case "$PRODUCT_LABELS" in *,product:signallq,*) move_in_project 10 "$PROJECT_10_ID" "$FIELD_10" ;; esac
          case "$PRODUCT_LABELS" in *,product:signallq-pro,*) move_in_project 11 "$PROJECT_11_ID" "$FIELD_11" ;; esac
          case "$PRODUCT_LABELS" in *,product:signallq-admin,*) move_in_project 12 "$PROJECT_12_ID" "$FIELD_12" ;; esac
          case "$PRODUCT_LABELS" in *,product:signallq-site,*) move_in_project 13 "$PROJECT_13_ID" "$FIELD_13" ;; esac

      - name: Sincronizar Project #9 (Bug Control) se issue for bug
        if: steps.decide.outputs.num != '' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          NUM: ${{ steps.decide.outputs.num }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          set -e

          # Verifica se a issue tem label bug
          IS_BUG=$(gh issue view "$NUM" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | contains(["bug"])')

          if [ "$IS_BUG" != "true" ]; then
            echo "Issue #$NUM não é bug — sem ação no Project #9"
            exit 0
          fi

          PROJECT_NUMBER_9="9"
          PROJECT_ID_9="PVT_kwHOD83n7c4BbZ6R"
          FIELD_STATUS_9="PVTSSF_lAHOD83n7c4BbZ6RzhWKp9I"
          OPT_IN_PROGRESS_9="47fc9ee4"
          OPT_DONE_9="98236657"

          case "$ACTION" in
            opened|reopened|ready_for_review) TARGET9="$OPT_IN_PROGRESS_9" ;;
            closed) [ "$MERGED" = "true" ] && TARGET9="$OPT_DONE_9" || TARGET9="" ;;
          esac

          [ -z "$TARGET9" ] && exit 0

          ITEM_ID=$(gh project item-list "$PROJECT_NUMBER_9" --owner "$PROJECT_OWNER" \
            --format json --limit 200 \
            --jq ".items[] | select(.content.number == $NUM) | .id")

          if [ -z "$ITEM_ID" ]; then
            echo "Issue #$NUM não encontrada no Project #9 — adicionando"
            ITEM_ID=$(gh project item-add "$PROJECT_NUMBER_9" --owner "$PROJECT_OWNER" \
              --url "https://github.com/${{ github.repository }}/issues/$NUM" \
              --format json --jq '.id')
          fi

          gh project item-edit --project-id "$PROJECT_ID_9" --id "$ITEM_ID" \
            --field-id "$FIELD_STATUS_9" --single-select-option-id "$TARGET9"

          echo "Bug #$NUM atualizado no Project #9"
