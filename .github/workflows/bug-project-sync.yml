name: Bug Project Sync

on:
  issues:
    types: [opened, reopened, closed, labeled]

permissions:
  contents: read
  issues: write

env:
  PROJECT_NUMBER: "9"
  PROJECT_OWNER: "gmmattey"
  PROJECT_ID: "PVT_kwHOD83n7c4BbZ6R"
  FIELD_STATUS_ID: "PVTSSF_lAHOD83n7c4BbZ6RzhWKp9I"
  OPT_TODO: "f75ad846"
  OPT_DONE: "98236657"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Decidir ação
        id: decide
        run: |
          ACTION="${{ github.event.action }}"
          LABELS='${{ toJSON(github.event.issue.labels) }}'
          IS_BUG=$(echo "$LABELS" | grep -c '"bug"' || true)
          TARGET=""

          case "$ACTION" in
            opened|labeled)
              # Só adiciona se a issue tem label bug
              if [ "$IS_BUG" -gt 0 ]; then
                TARGET="$OPT_TODO"
              fi
              ;;
            reopened)
              if [ "$IS_BUG" -gt 0 ]; then
                TARGET="$OPT_TODO"
              fi
              ;;
            closed)
              if [ "$IS_BUG" -gt 0 ]; then
                TARGET="$OPT_DONE"
              fi
              ;;
          esac

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "num=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Sincronizar com Project #9
        if: steps.decide.outputs.target != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          NUM: ${{ steps.decide.outputs.num }}
          TARGET: ${{ steps.decide.outputs.target }}
        run: |
          set -e
          ISSUE_URL="https://github.com/${{ github.repository }}/issues/$NUM"

          # Busca item existente no projeto
          ITEM_ID=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" \
            --format json --limit 200 \
            --jq ".items[] | select(.content.number == $NUM) | .id" 2>/dev/null || true)

          # Se não existe, adiciona
          if [ -z "$ITEM_ID" ]; then
            ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" \
              --url "$ISSUE_URL" --format json --jq '.id')
            echo "Issue #$NUM adicionada ao Project #9"
          fi

          # Atualiza status
          gh project item-edit \
            --project-id "$PROJECT_ID" \
            --id "$ITEM_ID" \
            --field-id "$FIELD_STATUS_ID" \
            --single-select-option-id "$TARGET"

          echo "Issue #$NUM → status atualizado no Project #9"
