name: "Feature"
description: "Nova funcionalidade ou melhoria perceptível ao usuário"
title: "[FEATURE] "
labels: ["type:feature"]
body:
  - type: textarea
    id: objetivo
    attributes:
      label: "Objetivo"
      description: "O que o usuário vai conseguir fazer? Uma frase."
      placeholder: "O usuário verá um card de alerta quando CGNAT for detectado na HomeScreen."
    validations:
      required: true

  - type: textarea
    id: contexto
    attributes:
      label: "Contexto"
      description: "Por que isso é necessário agora? Qual problema resolve?"
    validations:
      required: true

  - type: textarea
    id: criterios
    attributes:
      label: "Critérios de aceite"
      value: "- [ ] \n- [ ] \n- [ ] "
    validations:
      required: true

  - type: textarea
    id: fora_escopo
    attributes:
      label: "Fora de escopo"
      description: "O que explicitamente NÃO será feito nesta task."

  - type: dropdown
    id: plataforma
    attributes:
      label: "Plataforma"
      options: ["Android", "Infraestrutura"]
    validations:
      required: true

  - type: dropdown
    id: prioridade
    attributes:
      label: "Prioridade"
      options: ["P0 — Urgente", "P1 — Importante", "P2 — Backlog"]
    validations:
      required: true
