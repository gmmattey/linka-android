<!-- @dsCard group="Forma" -->
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--md-sys-color-surface-container-low);font-family:var(--font-sans);padding:22px;}
  .cap{font:500 11px/16px var(--font-sans);color:var(--md-sys-color-on-surface-variant-2);letter-spacing:.3px;text-transform:uppercase;margin-bottom:12px;}
  .row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .item{text-align:center;}
  .box{width:76px;height:56px;background:var(--md-sys-color-surface);border:1px solid var(--md-sys-color-outline-variant);}
  .lbl{font:500 12px/16px var(--font-sans);color:var(--md-sys-color-on-surface);margin-top:9px;}
  .v{font:400 11px/16px var(--font-sans);color:var(--md-sys-color-on-surface-variant);margin-top:2px;}
  .pillbox{width:76px;height:36px;border-radius:999px;background:var(--md-sys-color-primary);}
</style></head><body>
  <div class="cap">Forma — escala completa MD3 (7 tokens)</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0px"></div><div class="lbl">none</div><div class="v">0dp</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">xs</div><div class="v">4dp</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">sm</div><div class="v">8dp</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">md</div><div class="v">12dp · card / button / input</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">lg</div><div class="v">16dp · sheet / dialog</div></div>
    <div class="item"><div class="box" style="border-radius:28px"></div><div class="lbl">xl</div><div class="v">28dp</div></div>
    <div class="item"><div class="pillbox"></div><div class="lbl">full</div><div class="v">999dp · pill / chip</div></div>
  </div>
</body></html>
