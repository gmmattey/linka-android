<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<style>
  body{margin:0;background:var(--bg-secondary);font-family:var(--font-sans);padding:24px;}
  .nav{display:flex;background:var(--bg-primary);border-top:1px solid var(--border);border-radius:14px;padding:8px 4px 10px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text-tertiary);}
  .pill{padding:4px 18px;border-radius:999px;display:flex;align-items:center;justify-content:center;}
  .tab.on{color:var(--accent);}
  .tab.on .pill{background:rgba(108,43,255,.12);}
  .material-symbols-outlined{font-size:24px;}
  .lbl{font:500 11px/1 var(--font-sans);}
  .tab.on .lbl{font-weight:600;}
</style></head><body>
  <div class="nav">
    <div class="tab"><div class="pill"><span class="material-symbols-outlined">home</span></div><span class="lbl">Início</span></div>
    <div class="tab on"><div class="pill"><span class="material-symbols-outlined">speed</span></div><span class="lbl">Velocidade</span></div>
    <div class="tab"><div class="pill"><span class="material-symbols-outlined">wifi</span></div><span class="lbl">Sinal</span></div>
    <div class="tab"><div class="pill"><span class="material-symbols-outlined">history</span></div><span class="lbl">Histórico</span></div>
    <div class="tab"><div class="pill"><span class="material-symbols-outlined">settings</span></div><span class="lbl">Ajustes</span></div>
  </div>
</body></html>
