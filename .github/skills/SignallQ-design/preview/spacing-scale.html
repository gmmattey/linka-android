<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-primary);font-family:var(--font-sans);padding:22px 24px;}
  .cap{font:600 11px/1.3 var(--font-sans);color:var(--text-tertiary);letter-spacing:.3px;text-transform:uppercase;margin-bottom:14px;}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:11px;}
  .bar{height:16px;background:var(--accent);border-radius:3px;}
  .tk{font:600 13px/1 var(--font-sans);color:var(--text-primary);width:46px;}
  .v{font:400 12px/1 var(--font-sans);color:var(--text-secondary);}
</style></head><body>
  <div class="cap">Espaçamento — grid 8dp (LkSpacing)</div>
  <div class="row"><span class="tk">xs</span><span class="bar" style="width:4px"></span><span class="v">4dp</span></div>
  <div class="row"><span class="tk">sm</span><span class="bar" style="width:8px"></span><span class="v">8dp · unidade fundamental</span></div>
  <div class="row"><span class="tk">md</span><span class="bar" style="width:12px"></span><span class="v">12dp</span></div>
  <div class="row"><span class="tk">lg</span><span class="bar" style="width:16px"></span><span class="v">16dp · padding de tela + card</span></div>
  <div class="row"><span class="tk">xl</span><span class="bar" style="width:24px"></span><span class="v">24dp</span></div>
  <div class="row"><span class="tk">xxl</span><span class="bar" style="width:32px"></span><span class="v">32dp</span></div>
</body></html>
