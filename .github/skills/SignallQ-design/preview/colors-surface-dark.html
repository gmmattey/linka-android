<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="pt-br" class="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--md-sys-color-surface-container-low);font-family:var(--font-sans);padding:20px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{border-radius:var(--md-sys-shape-corner-sm);overflow:hidden;border:1px solid var(--md-sys-color-outline-variant);background:var(--md-sys-color-surface);}
  .chip{height:46px;}
  .meta{padding:7px 9px 9px;}
  .name{font:500 12px/16px var(--font-sans);color:var(--md-sys-color-on-surface);}
  .hex{font:400 11px/16px var(--font-sans);color:var(--md-sys-color-on-surface-variant);margin-top:1px;}
  .cap{font:500 11px/16px var(--font-sans);color:var(--md-sys-color-on-surface-variant);letter-spacing:.3px;text-transform:uppercase;margin-bottom:12px;}
</style></head><body>
  <div class="cap">Superfície — Tema Escuro (5 níveis de surface container)</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--md-sys-color-background);border-bottom:1px solid var(--md-sys-color-outline-variant)"></div><div class="meta"><div class="name">background</div><div class="hex">#000000</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--md-sys-color-surface-container-low)"></div><div class="meta"><div class="name">surfaceContainerLow</div><div class="hex">#161616</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--md-sys-color-surface-container)"></div><div class="meta"><div class="name">surfaceContainer</div><div class="hex">#1A1A1A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--md-sys-color-surface-container-high)"></div><div class="meta"><div class="name">surfaceContainerHigh</div><div class="hex">#202020</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--md-sys-color-surface-container-highest)"></div><div class="meta"><div class="name">surfaceContainerHighest</div><div class="hex">#262626</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--md-sys-color-primary)"></div><div class="meta"><div class="name">primary (tone80, corrigido §2)</div><div class="hex">#C9AEFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--md-sys-color-on-surface)"></div><div class="meta"><div class="name">onSurface</div><div class="hex">#F3F4F6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--md-sys-color-outline)"></div><div class="meta"><div class="name">outline</div><div class="hex">#2A2A2A</div></div></div>
  </div>
</body></html>
