<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Diagnóstico IA — telas (handoff)</title>
<style>
  html, body { margin: 0; padding: 0; background: #F5F4F0; font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif; color: #0D0D1A; }
  .wrap { padding: 32px 28px 60px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #6B7280; margin: 0 0 24px; }
  .rail { display: flex; gap: 28px; align-items: flex-start; overflow-x: auto; padding-bottom: 16px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0; }
  .label { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: #6B7280; letter-spacing: 0.4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Diagnóstico IA — fluxo de laudo (sem chat) + assistente</h1>
  <p class="sub">5 telas hi-fi · referência de design. Detalhes, tokens e comportamento no <code>README.md</code>.</p>
  <div id="app"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/tokens.jsx"></script>
<script type="text/babel" src="src/deps.jsx"></script>
<script type="text/babel" src="src/diagnostico.jsx"></script>

<script type="text/babel">
  const screens = [
    { label: '1 · Escolher sinais',        node: <DiagSetup /> },
    { label: '2 · Analisando',             node: <DiagAnalyzing /> },
    { label: '3 · Veredito + causa-raiz',  node: <DiagResultTop /> },
    { label: '4 · Recomendações + sinais', node: <DiagResultDetail /> },
    { label: '5 · Chat com a IA (LLM)',    node: <LLMChat /> },
  ];
  function Gallery() {
    return (
      <div className="rail">
        {screens.map((s, i) => (
          <div className="cell" key={i}>
            <PhoneFrame w={360} h={740}>{s.node}</PhoneFrame>
            <div className="label">{s.label}</div>
          </div>
        ))}
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<Gallery />);
</script>
</body>
</html>
