<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-secondary);font-family:var(--font-sans);padding:20px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#fff;}
  .chip{height:46px;}
  .meta{padding:7px 9px 9px;}
  .name{font:600 12px/1.2 var(--font-sans);color:var(--text-primary);}
  .hex{font:400 11px/1.3 var(--font-sans);color:var(--text-secondary);margin-top:1px;}
  .cap{font:600 11px/1.3 var(--font-sans);color:var(--text-tertiary);letter-spacing:.3px;text-transform:uppercase;margin-bottom:12px;}
</style></head><body>
  <div class="cap">Superfície — Tema Claro</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--border)"></div><div class="meta"><div class="name">bgPrimary</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#F3F4F6"></div><div class="meta"><div class="name">bgSecondary</div><div class="hex">#F3F4F6</div></div></div>
    <div class="sw"><div class="chip" style="background:#0D0D1A"></div><div class="meta"><div class="name">textPrimary</div><div class="hex">#0D0D1A</div></div></div>
    <div class="sw"><div class="chip" style="background:#6B7280"></div><div class="meta"><div class="name">textSecondary</div><div class="hex">#6B7280</div></div></div>
    <div class="sw"><div class="chip" style="background:#9CA3AF"></div><div class="meta"><div class="name">textTertiary</div><div class="hex">#9CA3AF</div></div></div>
    <div class="sw"><div class="chip" style="background:#E5E7EB"></div><div class="meta"><div class="name">border</div><div class="hex">#E5E7EB</div></div></div>
    <div class="sw"><div class="chip" style="background:#D1FAE5"></div><div class="meta"><div class="name">successCont.</div><div class="hex">#D1FAE5</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFF3CD"></div><div class="meta"><div class="name">warningCont.</div><div class="hex">#FFF3CD</div></div></div>
  </div>
</body></html>
