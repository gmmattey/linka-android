<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-primary);font-family:var(--font-sans);padding:22px 24px;}
  .line{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--border);}
  .line:last-child{border-bottom:0;}
  .tag{font:400 11px/1 var(--font-sans);color:var(--text-tertiary);width:130px;flex:none;}
</style></head><body>
  <div class="line"><span class="tag">displayLarge · 34/700</span><span class="display-large">95</span></div>
  <div class="line"><span class="tag">headlineLarge · 24/600</span><span class="headline-large">Conexão excelente</span></div>
  <div class="line"><span class="tag">headlineMedium · 20/600</span><span class="headline-medium">Resultado do teste</span></div>
  <div class="line"><span class="tag">headlineSmall · 18/600</span><span class="headline-small">Sua conexão</span></div>
  <div class="line"><span class="tag">titleLarge · 16/500</span><span class="title-large">Velocidade</span></div>
</body></html>
