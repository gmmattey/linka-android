<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--linka-black);font-family:var(--font-sans);padding:20px;}
  .cap{font:600 11px/1.3 var(--font-sans);color:var(--linka-text-secondary-on-dark);letter-spacing:.3px;text-transform:uppercase;margin-bottom:4px;}
  .sub{font:400 11px/1.4 var(--font-sans);color:var(--linka-text-secondary-on-dark);margin-bottom:14px;}
  .row{display:flex;gap:12px;}
  .sw{flex:1;border-radius:10px;overflow:hidden;border:1px solid #2c1c44;}
  .chip{height:50px;}
  .meta{padding:8px 10px 10px;}
  .name{font:600 12px/1.2 var(--font-sans);color:var(--linka-text-on-dark);}
  .hex{font:400 11px/1.3 var(--font-sans);color:var(--linka-text-secondary-on-dark);margin-top:1px;}
</style></head><body>
  <div class="cap">Orbit — IA (sempre escuro)</div>
  <div class="sub">Superfícies da IA não adaptam ao tema do sistema.</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0D0D1A"></div><div class="meta"><div class="name">linkaBlack</div><div class="hex">#0D0D1A</div></div></div>
    <div class="sw"><div class="chip" style="background:#1A0B2E"></div><div class="meta"><div class="name">darkSurface</div><div class="hex">#1A0B2E</div></div></div>
    <div class="sw"><div class="chip" style="background:#1E1130"></div><div class="meta"><div class="name">darkCard</div><div class="hex">#1E1130</div></div></div>
    <div class="sw"><div class="chip" style="background:linear-gradient(135deg,#6C2BFF,#2563EB)"></div><div class="meta"><div class="name">gradiente IA</div><div class="hex">accent→blue</div></div></div>
  </div>
</body></html>
