<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-primary);font-family:var(--font-sans);padding:20px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--border);}
  .chip{height:84px;display:flex;align-items:flex-end;padding:10px;}
  .meta{padding:10px 12px 12px;}
  .name{font:600 14px/1.2 var(--font-sans);color:var(--text-primary);}
  .hex{font:400 12px/1.4 var(--font-sans);color:var(--text-secondary);margin-top:2px;}
  .use{font:400 11px/1.35 var(--font-sans);color:var(--text-tertiary);margin-top:6px;}
</style></head><body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background:var(--accent)"></div>
      <div class="meta"><div class="name">accent</div><div class="hex">#6C2BFF</div>
        <div class="use">CTA primário · seleção · nav ativa</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--accent-blue)"></div>
      <div class="meta"><div class="name">accentBlue</div><div class="hex">#2563EB</div>
        <div class="use">Links · badges · dados móveis</div></div>
    </div>
  </div>
</body></html>
