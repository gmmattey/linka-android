<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-secondary);font-family:var(--font-sans);padding:22px;}
  .row{display:flex;gap:16px;align-items:flex-end;}
  .item{text-align:center;}
  .box{width:96px;height:64px;background:var(--bg-card);border:1px solid var(--border);}
  .lbl{font:600 12px/1.2 var(--font-sans);color:var(--text-primary);margin-top:9px;}
  .v{font:400 11px/1.3 var(--font-sans);color:var(--text-secondary);margin-top:2px;}
  .pillbox{width:96px;height:40px;border-radius:999px;background:var(--accent);}
</style></head><body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">card</div><div class="v">16dp</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">button / input</div><div class="v">12dp</div></div>
    <div class="item"><div class="pillbox"></div><div class="lbl">pill / chip</div><div class="v">999dp</div></div>
  </div>
</body></html>
