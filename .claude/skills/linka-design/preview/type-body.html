<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-primary);font-family:var(--font-sans);padding:22px 24px;}
  .line{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--border);}
  .line:last-child{border-bottom:0;}
  .tag{font:400 11px/1 var(--font-sans);color:var(--text-tertiary);width:130px;flex:none;}
</style></head><body>
  <div class="line"><span class="tag">bodyLarge · 16/400</span><span class="body-large">Sua internet está rápida e estável agora.</span></div>
  <div class="line"><span class="tag">bodyMedium · 14/400</span><span class="body-medium">Medimos download, upload, latência e jitter.</span></div>
  <div class="line"><span class="tag">bodySmall · 12/400</span><span class="body-small">Banda: 5GHz · RSSI −27 dBm · Canal 36</span></div>
  <div class="line"><span class="tag">labelLarge · 14/500</span><span class="label-large" style="color:var(--accent)">Medir velocidade</span></div>
  <div class="line"><span class="tag">overline · 11/600 +0.3</span><span class="overline">Sua conexão</span></div>
</body></html>
