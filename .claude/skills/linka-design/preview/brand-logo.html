<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-secondary);font-family:var(--font-sans);padding:24px;display:flex;gap:24px;align-items:center;}
  .mark{width:120px;height:120px;border-radius:50%;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 1px 6px rgba(0,0,0,.06);}
  .mark img{width:100px;height:100px;}
  .txt h1{font:600 20px/1.2 var(--font-sans);color:var(--text-primary);margin:0 0 6px;}
  .txt p{font:400 13px/1.5 var(--font-sans);color:var(--text-secondary);margin:0 0 4px;}
  .pkg{font:500 12px/1.4 var(--font-sans);color:var(--text-tertiary);}
</style></head><body>
  <div class="mark"><img src="../assets/ic_launcher_foreground.png" alt="SignallQ"></div>
  <div class="txt">
    <h1>SignallQ</h1>
    <p>Wordmark — minúsculas arredondadas, gradiente violeta→azul sobre disco branco.</p>
    <p class="pkg">io.signallq.app · "SignallQ — Diagnóstico de Conectividade"</p>
  </div>
</body></html>
