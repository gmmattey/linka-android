<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-primary);font-family:var(--font-sans);padding:22px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .badge{display:inline-flex;align-items:center;gap:5px;font:600 12px/1 var(--font-sans);padding:6px 11px;border-radius:999px;}
  .conn{background:rgba(34,197,94,.14);color:var(--success);}
  .ok{background:rgba(34,197,94,.10);color:var(--success);}
  .info{background:rgba(37,99,235,.10);color:var(--accent-blue);}
  .att{background:rgba(245,166,35,.12);color:#7A4E00;}
  .crit{background:rgba(255,77,79,.12);color:var(--error);}
  .accent{background:rgba(108,43,255,.10);color:var(--accent);}
</style></head><body>
  <span class="badge conn">✓ Conectado</span>
  <span class="badge ok">OK</span>
  <span class="badge info">INFO</span>
  <span class="badge att">ATENÇÃO</span>
  <span class="badge crit">CRÍTICO</span>
  <span class="badge accent">Roteador</span>
  <span class="badge accent">Gateway</span>
  <span class="badge ok">AP Mesh</span>
</body></html>
