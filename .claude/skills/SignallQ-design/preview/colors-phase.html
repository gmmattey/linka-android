<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-primary);font-family:var(--font-sans);padding:20px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--border);}
  .chip{height:64px;}
  .meta{padding:10px 12px 12px;}
  .name{font:600 13px/1.2 var(--font-sans);color:var(--text-primary);}
  .hex{font:400 12px/1.4 var(--font-sans);color:var(--text-secondary);margin-top:2px;}
  .cap{font:600 11px/1.3 var(--font-sans);color:var(--text-tertiary);letter-spacing:.3px;text-transform:uppercase;margin-bottom:10px;}
</style></head><body>
  <div class="cap">SpeedTest — cores de fase</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--phase-latencia)"></div>
      <div class="meta"><div class="name">phaseLatencia</div><div class="hex">#60A5FA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--phase-download)"></div>
      <div class="meta"><div class="name">phaseDownload</div><div class="hex">#34D399</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--phase-upload)"></div>
      <div class="meta"><div class="name">phaseUpload</div><div class="hex">#FBBF24</div></div></div>
  </div>
</body></html>
