name = "signallq-admin"
main = "src/index.ts"
compatibility_date = "2026-06-21"

[vars]
ALLOWED_ORIGIN = "https://signallq-admin-panel.pages.dev"
FIREBASE_PROJECT_ID = "signallq-app"
FIREBASE_GA4_PROPERTY_ID = "542463828"

# Secrets: npx wrangler secret put ADMIN_SECRET / FIREBASE_CLIENT_EMAIL / FIREBASE_PRIVATE_KEY
# INGEST_KEY: chave separada para autenticar o app Android em POST /ingest/*
#   Scope limitado — nao da acesso de leitura ao painel.
#   Gerar: openssl rand -hex 32
#   Deploy: npx wrangler secret put INGEST_KEY
#   App: adicionar em local.properties -> ADMIN_INGEST_KEY=<valor>

[[d1_databases]]
binding = "DB"
database_name = "signallq-admin-db"
database_id = "952cb253-1a84-48ac-9018-a4ca31036915"

# GH#877 — sync automático de telemetria (Firebase Analytics + Google Play).
# 1x/dia é suficiente: o export GA4->BigQuery é diário (não há granularidade
# maior pra ganhar rodando com mais frequência) e ratings/tracks do Play Console
# não mudam rápido o bastante pra justificar polling mais agressivo.
# 06:00 UTC = 03:00 BRT (horário de menor tráfego no painel).
[triggers]
crons = ["0 6 * * *"]
