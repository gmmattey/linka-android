name = "linka-ai-diagnosis-worker"
main = "src/index.ts"
compatibility_date = "2026-05-09"

[vars]
# Modelo padrao do diagnostico SignallQ: Qwen3 30B MoE FP8 (Alibaba/Qwen) via
# Cloudflare Workers AI. MoE com 30B total / 3B ativos — inferencia rapida,
# excelente para JSON estruturado e portugues brasileiro. FP8 quantizado.
# Politica do projeto: Llama/Meta NAO deve ser configurado aqui — nem como
# padrao, nem como fallback cloud. Em caso de falha do modelo, o cliente
# Kotlin usa o fallback local (sem IA externa).
AI_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
ADMIN_WORKER_URL = "https://signallq-admin.giammattey-luiz.workers.dev"

# ADMIN_SECRET — mesma senha do painel admin:
#   npx wrangler secret put ADMIN_SECRET --name linka-ai-diagnosis-worker

# GEMINI_API_KEY — ativa Gemini 2.0 Flash como provider primário (Qwen/CF fica
# como fallback automático). Sem esta secret, Qwen/CF é o único provider.
#   npx wrangler secret put GEMINI_API_KEY --name linka-ai-diagnosis-worker

[ai]
binding = "AI"

# GH#767 — fetch() direto pra outro *.workers.dev e bloqueado pela Cloudflare
# (erro 1042, anti-loop entre workers.dev). Service binding chama o worker
# diretamente, sem passar pela rede publica — e a forma correta de
# Worker-to-Worker. ADMIN_WORKER_URL acima fica so de referencia/fallback.
[[services]]
binding = "ADMIN_WORKER"
service = "signallq-admin"

