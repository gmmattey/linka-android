openapi: 3.1.0
info:
  title: SignallQ PWA Backend API
  version: 0.1.0
  description: >
    API local do SignallQ PWA em Cloudflare Pages Functions. As rotas expostas em
    /api/* mantem segredos fora do browser e respeitam as limitacoes reais do navegador.
servers:
  - url: http://localhost:8788
    description: Wrangler Pages local
  - url: http://localhost:5173
    description: Vite dev quando proxy/local adapter estiver disponivel
tags:
  - name: SpeedTest
  - name: Diagnostico
  - name: Admin Ingest
paths:
  /api/speedtest/latency:
    get:
      tags: [SpeedTest]
      summary: Mede latencia HTTP aproximada
      description: Retorna um payload leve para medicao client-side com performance.now(). Nao e ping ICMP.
      responses:
        '200':
          description: Payload de latencia HTTP
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatencyResponse'
  /api/speedtest/download:
    get:
      tags: [SpeedTest]
      summary: Gera payload binario para medir download
      parameters:
        - in: query
          name: bytes
          required: false
          schema:
            type: integer
            minimum: 65536
            maximum: 2097152
            default: 524288
          description: Tamanho desejado do payload. O servidor aplica clamp entre minimo e maximo.
      responses:
        '200':
          description: Bytes para medicao de download
          headers:
            Cache-Control:
              schema:
                type: string
              example: no-store, no-cache, must-revalidate
            X-SignallQ-Speedtest-Bytes:
              schema:
                type: string
              example: '524288'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /api/speedtest/upload:
    post:
      tags: [SpeedTest]
      summary: Recebe payload binario para medir upload
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Upload recebido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '413':
          description: Payload acima de 4 MiB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ai/diagnostico-conexao:
    post:
      tags: [Diagnostico]
      summary: Encaminha payload de diagnostico para Worker de IA
      description: Requer AI_WORKER_URL no ambiente Pages. Falhas devem ser tratadas pelo client com fallback local.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticPayload'
      responses:
        '200':
          description: Resposta do Worker de IA
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '503':
          description: AI_WORKER_URL ausente no servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/ingest:
    post:
      tags: [Admin Ingest]
      summary: Proxy server-side para ingestao do SignallQ Admin
      description: >
        Encaminha diagnostic ou ai-usage para /ingest/* usando ADMIN_INGEST_KEY no servidor.
        A chave nunca deve ser exposta no bundle do PWA.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminIngestRequest'
            examples:
              diagnostic:
                value:
                  kind: diagnostic
                  payload:
                    id: diag_pwa_123
                    created_at: 1782420000
                    network_type: wifi
                    status: regular
                    download_mbps: 42.8
                    upload_mbps: 11.2
                    latency_ms: 38
                    jitter_ms: null
                    packet_loss: null
                    issues: []
                    environment: development
                    dist_channel: pwa
                    build_type: web
                    version_code: 1
                    device_id: pwa-anonymous
              aiUsage:
                value:
                  kind: ai-usage
                  payload:
                    id: ai_pwa_123
                    session_id: diag_pwa_123
                    model: local-fallback
                    total_tokens: 0
                    cost_usd: 0
                    environment: development
                    version_code: 1
      responses:
        '200':
          description: Resposta encaminhada do Admin Worker
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '201':
          description: Registro criado no Admin Worker
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Envelope invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Variaveis server-side ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    LatencyResponse:
      type: object
      required: [ok, now, method, limitations]
      properties:
        ok:
          type: boolean
          const: true
        now:
          type: integer
        method:
          type: string
          const: http_timing
        limitations:
          type: array
          items:
            type: string
          example: [http_latency_not_icmp_ping]
    UploadResponse:
      type: object
      required: [ok, receivedBytes, receivedAt, limitations]
      properties:
        ok:
          type: boolean
          const: true
        receivedBytes:
          type: integer
        receivedAt:
          type: integer
        limitations:
          type: array
          items:
            type: string
    DiagnosticPayload:
      type: object
      required: [schemaVersion, source, connectionType, metricasAtuais]
      properties:
        schemaVersion:
          type: string
          example: pwa_foundation_v1
        source:
          type: string
          const: pwa
        connectionType:
          type: string
          example: wifi
        metricasAtuais:
          type: object
          properties:
            downloadMbps:
              type: [number, 'null']
            uploadMbps:
              type: [number, 'null']
            latenciaMs:
              type: [number, 'null']
    AdminIngestRequest:
      type: object
      required: [kind, payload]
      properties:
        kind:
          type: string
          enum: [diagnostic, ai-usage]
        payload:
          type: object
          additionalProperties: true
