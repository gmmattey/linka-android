build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8

style:
  MaxLineLength:
    maxLineLength: 160
    excludeCommentStatements: true

comments:
  active: false

naming:
  active: true

libraries:
  ForbiddenImport:
    active: true
    severity: error
    imports:
      - value: 'android.util.Log'
        reason: 'Use Timber.* para logging centralizado. android.util.Log bypassa o filtro de release.'
