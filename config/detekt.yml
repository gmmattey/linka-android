build:
  maxIssues: 2000

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8

style:
  MaxLineLength:
    maxLineLength: 160
    excludeCommentStatements: true

comments:
  active: false

naming:
  active: true

# ForbiddenImport: desabilitada temporariamente — 'libraries' não existe no Detekt 1.23.7.
# A rule pertence à categoria 'imports' (ou 'style'). Reativar com a sintaxe correta.
